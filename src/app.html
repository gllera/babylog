        measureLatestHtml[entity] = null;
        document.getElementById("latest-" + entity).innerHTML =
          '<span class="measure-note">' + escapeHtml(i18n("Error loading: {e}", { e: err.message })) + "</span>";
      }
    }

    // --- Growth charts (weight / height over time, with WHO percentile bands) ---
    var MEASURE_CHARTS = {
      weights: { elId: "weights-chart", title: "Weight over time", who: "wfa", scale: 1000, estKey: "est_weight_g", fmtEst: fmtEstG },
      heights: { elId: "heights-chart", title: "Height over time", who: "lfa", scale: 1, estKey: "est_height_cm", fmtEst: fmtEstCm }
    };

    // WHO percentile of a value at a moment (a reading's instant, or right
    // now for the estimate), or null when the profile lacks sex/birth date
    // or the age falls outside the 0-24-month tables.
    function whoPercentileAt(entity, tMs, value) {
      var mc = MEASURE_CHARTS[entity];
      var prof = profileData;
      if (!prof || !prof.date_of_birth ||
          (prof.sex !== "male" && prof.sex !== "female")) return null;
      if (isNaN(tMs) || !isFinite(value)) return null;
      var dobMs = new Date(prof.date_of_birth + "T00:00:00Z").getTime();
      var lms = lmsAt(WHO_LMS[mc.who][prof.sex], (tMs - dobMs) / DAY_MS / 30.4375);
      if (!lms) return null;
      return Math.round(normCdf(lmsZ(lms, value / mc.scale)) * 100);
    }

    function whoPercentile(entity, items) {
      if (!items.length) return null;
      return whoPercentileAt(entity, new Date(items[0].ts).getTime(),
        Number(items[0][entities[entity].key]));
    }

    // "P62", fenced to "<P1"/">P99" at the tails. Returns markup-safe text.
    function fmtPct(pct) { return pct < 1 ? "&lt;P1" : pct > 99 ? "&gt;P99" : "P" + pct; }

    // The number the screen is opened for: the growth model's estimate for
    // right now, over its WHO percentile at today's age ("today · P62" —
    // the question the page answers is "on her curve?"). When the model
    // has no estimate yet, the row falls back to the newest reading, its
    // day and percentile. The ledger behind the fold keeps the readings.
    var measureLatestHtml = { weights: null, heights: null };

    function renderMeasureLatest(entity, items, est) {
      var el = document.getElementById("latest-" + entity);
      if (!el) return;
      if (!items.length) {
        measureLatestHtml[entity] = null;
        // The note sits inside the tap target, so the copy can teach the
        // gesture: the direction IS the fix.
        el.innerHTML = '<span class="measure-note">' + escapeHtml(i18n(
          entity === "weights" ? "Tap to add the first weight" : "Tap to add the first height"
        )) + "</span>";
        return;
      }
      if (typeof est === "number") {
        var pctNow = whoPercentileAt(entity, Date.now(), est);
        measureLatestHtml[entity] = '<span class="measure-val">&asymp; ' +
          escapeHtml(MEASURE_CHARTS[entity].fmtEst(est)) + '</span>' +
          (pctNow != null ? '<span class="measure-opt">' + escapeHtml(i18n("today")) +
            ' &middot; ' + fmtPct(pctNow) + '</span>' : '');
      } else {
        var pct = whoPercentile(entity, items);
        measureLatestHtml[entity] = '<span class="measure-val">' +
          escapeHtml(fmtMeasure(entity, items[0][entities[entity].key])) + '</span>' +
          '<span class="measure-opt">' + escapeHtml(fmtDayMonth(new Date(items[0].ts))) + '</span>' +
          (pct != null ? '<span class="measure-opt"> &middot; ' + fmtPct(pct) + '</span>' : '');
      }
      fitMeasureLatest(entity);
    }

    // One dial column by contract: when a line doesn't fit the column,
    // .measure-opt segments drop end-first (percentile,
    // then date, on the fallback reading line), and in the last extreme
    // the value itself goes rather than getting clipped — a truncated
    // number would read as a different number; the panel behind Edit
    // keeps the data. Measured, not breakpointed, because segment widths
    // shift with locale and content; and measured with a Range, because
    // scrollWidth rounds to whole pixels and lets sub-pixel overflow
    // through to paint as a mid-word ellipsis.
    var measureRange = document.createRange();

    function fitMeasureLatest(entity) {
      var el = document.getElementById("latest-" + entity);
      if (!el || !measureLatestHtml[entity] || !el.clientWidth) return;
      el.innerHTML = measureLatestHtml[entity];
      var parts = el.querySelectorAll(".measure-val, .measure-opt");
      for (var i = parts.length - 1; i >= 0; i--) {
        measureRange.selectNodeContents(el);
        if (measureRange.getBoundingClientRect().width - el.getBoundingClientRect().width <= 0.25) break;
        parts[i].hidden = true;
      }
    }

    window.addEventListener("resize", function() {
      fitMeasureLatest("weights");
      fitMeasureLatest("heights");
    });

    function renderMeasureChart(entity, items, est) {
      var mc = MEASURE_CHARTS[entity];
      var el = document.getElementById(mc.elId);
      if (!el) return;
      var pts = [];
      for (var i = items.length - 1; i >= 0; i--) { // API returns newest first
        var t = new Date(items[i].ts).getTime();
        var v = Number(items[i][entities[entity].key]);
        if (!isNaN(t) && isFinite(v)) pts.push({ t: t, v: v });
      }
      // The dial's claim drawn onto the trend: a dashed projection from
      // the last reading to right now, ending hollow at the estimate.
      var proj = null;
      if (pts.length && typeof est === "number" && isFinite(est) && Date.now() > pts[pts.length - 1].t) {
        proj = { t: Date.now(), v: est };
      }
      // One reading draws no trend on its own — unless the projection
      // supplies the second point; the latest line and ledger carry it.
      if (pts.length < 2 && !proj) {
        el.hidden = true;
        el.innerHTML = "";
        return;
      }
      var t0 = pts[0].t, t1 = proj ? proj.t : pts[pts.length - 1].t;

      // WHO percentile curves over the displayed range, when the profile has
      // what they need (sex + date of birth) and the age range fits 0-24 months.
      var who = null;
      var prof = profileData;
      if (prof && prof.date_of_birth && (prof.sex === "male" || prof.sex === "female") && t1 > t0) {
        var table = WHO_LMS[mc.who][prof.sex];
        var dobMs = new Date(prof.date_of_birth + "T00:00:00Z").getTime();
        var ageMo = function(t) { return (t - dobMs) / DAY_MS / 30.4375; };
        var samples = [], curves = [], ok = true, s, z;
        for (s = 0; s <= 24; s++) samples.push(t0 + ((t1 - t0) * s) / 24);
        for (z = 0; z < Z_PCTS.length && ok; z++) {
          var curve = [];
          for (s = 0; s < samples.length; s++) {
            var lms = lmsAt(table, ageMo(samples[s]));
            if (!lms) { ok = false; break; }
            curve.push(lmsValue(lms, Z_PCTS[z][0]) * mc.scale);
          }
          curves.push(curve);
        }
        if (ok) who = { samples: samples, curves: curves };
      }

      var vmin = Infinity, vmax = -Infinity;
      for (var j = 0; j < pts.length; j++) {
        if (pts[j].v < vmin) vmin = pts[j].v;
        if (pts[j].v > vmax) vmax = pts[j].v;
      }
      if (proj) {
        if (proj.v < vmin) vmin = proj.v;
        if (proj.v > vmax) vmax = proj.v;
      }
      if (who) {
        for (var c = 0; c < who.curves.length; c++) {
          for (var cs = 0; cs < who.curves[c].length; cs++) {
            if (who.curves[c][cs] < vmin) vmin = who.curves[c][cs];
            if (who.curves[c][cs] > vmax) vmax = who.curves[c][cs];
          }
        }
      }
      if (vmin === vmax) { vmin -= 1; vmax += 1; }

      var LX = 25, RX = 322, TOP = 8, BOT = 132, LABEL_Y = 148;
      function px(t) { return t1 === t0 ? LX : +(LX + ((t - t0) / (t1 - t0)) * (RX - LX)).toFixed(1); }
      function py(v) { return +(BOT - ((v - vmin) / (vmax - vmin)) * (BOT - TOP)).toFixed(1); }

      var whoSvg = "";
      if (who) {
        function curveLine(curve) {
          var p = "";
          for (var s = 0; s < who.samples.length; s++) p += px(who.samples[s]) + "," + py(curve[s]) + " ";
          return p.trim();
        }
        function bandPolygon(hiIdx, loIdx, cls) {
          var p = "";
          var s;
          for (s = 0; s < who.samples.length; s++) p += px(who.samples[s]) + "," + py(who.curves[hiIdx][s]) + " ";
          for (s = who.samples.length - 1; s >= 0; s--) p += px(who.samples[s]) + "," + py(who.curves[loIdx][s]) + " ";
          return '<polygon class="' + cls + '" points="' + p.trim() + '"></polygon>';
        }
        var last = who.samples.length - 1;
        whoSvg = bandPolygon(4, 0, "who-band") + bandPolygon(3, 1, "who-band inner") +
          '<polyline class="who-mid" points="' + curveLine(who.curves[2]) + '"></polyline>' +
          '<text class="who-lbl" x="324" y="' + (py(who.curves[4][last]) + 2) + '">P97</text>' +
          '<text class="who-lbl" x="324" y="' + (py(who.curves[2][last]) + 2) + '">P50</text>' +
          '<text class="who-lbl" x="324" y="' + (py(who.curves[0][last]) + 2) + '">P3</text>';
      }

      var poly = "", dots = "";
      for (var k = 0; k < pts.length; k++) {
        var x = px(pts[k].t), y = py(pts[k].v);
        poly += x + "," + y + " ";
        dots += '<circle class="cl-dot" cx="' + x + '" cy="' + y + '" r="3.5"></circle>';
      }
      // Dashed reach under the reading dots, hollow estimate point on top.
      var projLine = "", estDot = "";
      if (proj) {
        var lastPt = pts[pts.length - 1];
        projLine = '<line class="cl-proj" x1="' + px(lastPt.t) + '" y1="' + py(lastPt.v) +
          '" x2="' + px(proj.t) + '" y2="' + py(proj.v) + '"></line>';
        estDot = '<circle class="cl-est" cx="' + px(proj.t) + '" cy="' + py(proj.v) + '" r="3.5"></circle>';
      }
      var dateLabels =
        '<text class="cl-daylabel" x="' + LX + '" y="' + LABEL_Y + '">' + escapeHtml(fmtDayMonth(new Date(t0))) + '</text>' +
        '<text class="cl-daylabel" x="' + RX + '" y="' + LABEL_Y + '">' + escapeHtml(fmtDayMonth(new Date(t1))) + '</text>';
      el.hidden = false;
      el.innerHTML =
        '<svg class="chart-lines" viewBox="0 0 350 152" preserveAspectRatio="xMidYMid meet" role="img" aria-label="' + escapeHtml(i18n(mc.title)) + '">' +
        whoSvg +
        '<polyline class="cl-line" points="' + poly.trim() + '"></polyline>' +
        projLine + dots + estDot + dateLabels +
        '</svg>';
    }

    // Localized weekday abbreviations (Mon-first), used by day labels
    // across the Today tape, its rows and the history ledgers.
    var WEEK_DAY_LABELS = LANG === "es"
      ? ["Lun", "Mar", "Mié", "Jue", "Vie", "Sáb", "Dom"]
      : ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

    function weekdayLabel(d) {
      return WEEK_DAY_LABELS[(d.getUTCDay() + 6) % 7];
    }

    // The ledger: one ruled line per record, day-grained (these are
    // pediatrician-visit numbers — the clock is noise). The line is the
    // edit button; the × alongside deletes with the two-tap confirm. It
    // lives inside the fold-out Edit panel next to the add row, so the
    // panel's open state (plain DOM, untouched here) survives the
    // re-render that follows an add, edit or delete.
    function renderList(entity, items) {
      var container = document.getElementById("list-" + entity);
      var byId = {};
      listItemsById[entity] = byId;
      if (!items.length) {
        container.innerHTML = "";
        return;
      }
      var rows = "";
      for (var j = 0; j < items.length; j++) {
        var item = items[j];
        byId[item.id] = item;
        var dts = new Date(item.ts);
        // The gain since the previous (older) reading — the checkup number.
        // Always rendered so every value keeps one right edge; the oldest
        // row (and a no-change row) leaves the column blank.
        var cur = Number(item[entities[entity].key]);
        var prev = j + 1 < items.length ? Number(items[j + 1][entities[entity].key]) : NaN;
        var d = Math.round((cur - prev) * 10) / 10;
        var delta = isFinite(d) && d !== 0
          ? (d > 0 ? "+" : "−") + fmtThousands(Math.abs(d)) : "";
        rows += '<div class="ledger-row">' +
          '<button type="button" class="ledger-edit" data-id="' + item.id + '">' +
            '<span class="ledger-when">' +
              escapeHtml(isNaN(dts.getTime()) ? String(item.ts) : fmtIsoDate(madridDateStr(dts))) + '</span>' +
            '<span class="ledger-val">' + escapeHtml(fmtMeasure(entity, item[entities[entity].key])) + '</span>' +
            '<span class="ledger-delta">' + escapeHtml(delta) + '</span>' +
          '</button>' +
          '<button type="button" class="delete-btn" data-id="' + item.id + '" data-entity="' + entity +
            '" aria-label="' + escapeHtml(i18n("Delete")) + '" title="' + escapeHtml(i18n("Delete")) + '">&times;</button>' +
        '</div>';
      }
      container.innerHTML = rows;
    }

    // --- Dashboard ---
    // Mirror the selection onto the page URL: a non-default baby carries
    // ?baby=<id> so the address can be bookmarked, the default keeps the
    // URL clean. Mirrors pickBaby's fallback (no default flag → oldest).
    var defaultBabyId = null;

    function syncBabyUrl() {
      var want = selectedBabyId != null && defaultBabyId != null &&
        String(selectedBabyId) !== String(defaultBabyId)
        ? "?baby=" + encodeURIComponent(selectedBabyId) : "";
      if (location.search !== want) {
        history.replaceState(null, "", location.pathname + want + location.hash);
      }
    }

    // Reconcile the selected baby with the server's pick (it falls back to
    // the default when our stored id is stale) and render the switcher for
    // multi-baby households.
    function syncBabies(d) {
      var babies = d.babies || [];
      if (d.baby_id != null && String(d.baby_id) !== String(selectedBabyId)) {
        selectedBabyId = String(d.baby_id);
        try { localStorage.setItem("babyId", selectedBabyId); } catch (_) {}
      }
      defaultBabyId = null;
      for (var j = 0; j < babies.length && defaultBabyId == null; j++) {
        if (babies[j].is_default) defaultBabyId = String(babies[j].id);
      }
      if (defaultBabyId == null && babies.length) defaultBabyId = String(babies[0].id);
      syncBabyUrl();
      var el = document.getElementById("baby-switcher");
      if (!el) return;
      if (babies.length < 2) { el.hidden = true; el.innerHTML = ""; return; }
      var html = "";
      for (var i = 0; i < babies.length; i++) {
        var b = babies[i];
        html += '<button type="button" data-baby="' + b.id + '"' +
          (String(b.id) === String(selectedBabyId) ? ' class="active"' : "") + '>' +
          escapeHtml(b.name || ("Baby #" + b.id)) + "</button>";
      }
      el.innerHTML = html;
      el.hidden = false;
    }

    document.getElementById("baby-switcher").addEventListener("click", function(e) {
      var t = e.target;
      if (!t || !t.getAttribute) return;
      var id = t.getAttribute("data-baby");
      if (!id || String(id) === String(selectedBabyId)) return;
      try { localStorage.setItem("babyId", id); } catch (_) {}
      selectedBabyId = String(id);
      syncBabyUrl(); // before the reload, or the old ?baby= wins on boot
      // Full reload: every tab, chart, and cache re-fetches under the new baby.
      location.reload();
    });

    // --- Settings (masthead, babies, partners, language) ---
    // Kept for the 30s repaint: the masthead's age line has to cross
    // midnight without a refetch.
    var settingsBabies = [];

    async function loadSettings() {
      try {
        var d = await fetchJson("/api/household");
        settingsBabies = d.babies || [];
        renderMasthead(settingsBabies);
        renderSettingsBabies(settingsBabies);
        renderSettingsCaregivers(d.caregivers || [], d.me || {});
        // A household with no baby yet gets its first fold opened for it —
        // the bare masthead alone would never say where "add a baby" lives.
        if (!settingsBabies.length && document.getElementById("panel-babies").hidden) {
          setFold(document.querySelector(".masthead-btn"), true);
        }
      } catch (err) {
        toastErr(err, "Error loading: {e}");
      }
    }

    // Age the way parents say it: days alone under one month, then
    // "months and days", then "years and months" — calendar-accurate in
    // Madrid wall time (months counted by monthiversaries, the birth day
    // clamped into short months, e.g. born the 31st → Feb 28 counts).
    // Zero remainders drop off ("5 months", not "5 months and 0 days").
    function daysInMonth(y, m) { // m: 1-12
      return new Date(Date.UTC(y, m, 0)).getUTCDate();
    }

    function ageLabel(isoDob) {
      var b = String(isoDob).split("-").map(Number);
      var t = madridDateStr(new Date()).split("-").map(Number);
      if (b.length !== 3 || !b[0] || !b[1] || !b[2]) return "";
      var months = (t[0] - b[0]) * 12 + (t[1] - b[1]);
      var days;
      if (t[2] >= Math.min(b[2], daysInMonth(t[0], t[1]))) {
        days = t[2] - Math.min(b[2], daysInMonth(t[0], t[1]));
      } else {
        months--;
        var py = t[1] === 1 ? t[0] - 1 : t[0];
        var pm = t[1] === 1 ? 12 : t[1] - 1;
        days = t[2] + daysInMonth(py, pm) - Math.min(b[2], daysInMonth(py, pm));
      }
      if (months < 0 || (months === 0 && days < 0)) return ""; // future dob
      if (months === 0) return plural(days, "{n} day", "{n} days");
      var big, small;
      if (months < 12) {
        big = plural(months, "{n} month", "{n} months");
        small = days > 0 ? plural(days, "{n} day", "{n} days") : "";
      } else {
        big = plural(Math.floor(months / 12), "{n} year", "{n} years");
        var rem = months % 12;
        small = rem > 0 ? plural(rem, "{n} month", "{n} months") : "";
      }
      return small ? i18n("{a} and {b}", { a: big, b: small }) : big;
    }

    // The flyleaf masthead: whose diary this is. Prefers the baby the UI
    // is scoped to, falling back to the household default. The sub-line
    // says only the age — sex and the exact birth date are ledger facts
    // and live in the fold the masthead itself opens.
    function renderMasthead(babies) {
      var nameEl = document.getElementById("masthead-name");
      var subEl = document.getElementById("masthead-sub");
      if (!nameEl || !subEl) return;
      var b = null, i;
      for (i = 0; i < babies.length && !b; i++) {
        if (String(babies[i].id) === String(selectedBabyId)) b = babies[i];
      }
      for (i = 0; i < babies.length && !b; i++) {
        if (babies[i].is_default) b = babies[i];
      }
      if (!b) b = babies[0];
      if (!b) {
        nameEl.textContent = i18n("Baby diary");
        subEl.textContent = i18n("Add your baby"); // the empty flyleaf invites
        return;
      }
      nameEl.textContent = b.name || "Baby #" + b.id;
      subEl.textContent = b.date_of_birth ? ageLabel(b.date_of_birth) : "";
    }

    // The ledgers' one full-date dialect (birth dates, reading days):
    // DD/MM/YYYY — both app locales read it the same way (es-ES and this
    // app's Madrid-household English; a US-style locale would branch
    // here). Sliced from the wall-date string, never through a Date, so
    // no timezone can shift the day.
    function fmtIsoDate(iso) {
      var p = String(iso).split("-");
      return p.length === 3 ? p[2] + "/" + p[1] + "/" + p[0] : String(iso);
    }

    function renderSettingsBabies(babies) {
      var el = document.getElementById("settings-babies");
      var html = "";
      for (var i = 0; i < babies.length; i++) {
        var b = babies[i];
        var sex = b.sex === "female" ? i18n("Girl") : b.sex === "male" ? i18n("Boy") : "";
        html += '<div class="ledger-row"><button type="button" class="ledger-edit" data-id="' + b.id + '">' +
          '<span class="grow">' + escapeHtml(b.name || "Baby #" + b.id) + '</span>' +
          (sex ? '<span class="ledger-tag">' + escapeHtml(sex) + '</span>' : "") +
          (b.date_of_birth ? '<span class="ledger-when">' + escapeHtml(fmtIsoDate(b.date_of_birth)) + '</span>' : "") +
          '</button>' +
          '<button type="button" class="delete-btn baby-remove" data-id="' + b.id +
            '" aria-label="' + escapeHtml(i18n("Delete")) + '" title="' + escapeHtml(i18n("Delete")) + '">&times;</button>' +
          '</div>';
      }
      // No note when empty: this ledger is only ever empty on first run,
      // where the fold is auto-opened and the add form is the invitation.
      el.innerHTML = html;
    }

    // Tap a baby row to load it into the form below — the growth ledgers'
    // grammar. This is the one place name, sex and birth date can be fixed,
    // and the latter two gate the age line and every WHO feature.
    var babyEditId = null;

    function babyEditForm() { return document.getElementById("form-add-baby"); }

    function enterBabyEdit(b) {
      var form = babyEditForm();
      babyEditId = b.id;
      form.elements.name.value = b.name || "";
      form.elements.sex.value = b.sex === "male" || b.sex === "female" ? b.sex : "";
      form.elements.date_of_birth.value = b.date_of_birth || "";
      form.classList.add("editing");
      var sub = form.querySelector("button[type=submit]");
      sub.setAttribute("data-i18n", "Update");
      sub.textContent = i18n("Update");
      form.querySelector(".cancel-edit").hidden = false;
    }

    function exitBabyEdit() {
      var form = babyEditForm();
      babyEditId = null;
      form.reset();
      form.classList.remove("editing");
      var sub = form.querySelector("button[type=submit]");
      sub.setAttribute("data-i18n", "Add baby");
      sub.textContent = i18n("Add baby");
      form.querySelector(".cancel-edit").hidden = true;
    }

    document.getElementById("settings-babies").addEventListener("click", function(e) {
      var btn = e.target.closest(".ledger-edit");
      if (!btn) return;
      for (var i = 0; i < settingsBabies.length; i++) {
        if (String(settingsBabies[i].id) === String(btn.getAttribute("data-id"))) {
          enterBabyEdit(settingsBabies[i]);
          return;
        }
      }
    });

    document.querySelector("#form-add-baby .cancel-edit").addEventListener("click", exitBabyEdit);

    // The partner roster: ruleless centered lines at rest, living inside
    // the section's fold button — so removal moves to a ruled ledger in
    // the panel (a remove × can't nest inside the roster's button). The ×
    // is the ledgers' two-tap delete, handled by the shared document
    // listener below.
    function renderSettingsCaregivers(caregivers, me) {
      var roster = "", ledger = "";
      for (var i = 0; i < caregivers.length; i++) {
        var c = caregivers[i];
        var self = c.id === me.id;
        var email = escapeHtml(c.email);
        var tag = self ? '<span class="ledger-tag">' + escapeHtml(i18n("you")) + '</span>' : "";
        roster += '<span class="roster-row"><span class="roster-main">' + email + '</span>' + tag + '</span>';
        ledger += '<div class="ledger-row"><div class="ledger-line">' +
          '<span class="grow">' + email + '</span>' + tag + '</div>' +
          (self ? "" : '<button type="button" class="delete-btn cg-remove" data-id="' + c.id +
            '" aria-label="' + escapeHtml(i18n("Remove")) + '" title="' + escapeHtml(i18n("Remove")) + '">&times;</button>') +
          '</div>';
      }
      document.getElementById("settings-caregivers").innerHTML = roster;
      document.getElementById("ledger-caregivers").innerHTML = ledger;
    }

    document.getElementById("form-add-baby").addEventListener("submit", async function(e) {
      e.preventDefault();
      var form = e.currentTarget;
      var fd = new FormData(form);
      var body = { name: String(fd.get("name") || "").trim() };
      if (!body.name) return;
      var btn = form.querySelector("button[type=submit]");
      btn.disabled = true;
      try {
        if (babyEditId) {
          // An edit is a full statement of the row: an emptied sex/date
          // clears the column (the add path just omits absent fields).
          body.sex = fd.get("sex") ? String(fd.get("sex")) : null;
          body.date_of_birth = fd.get("date_of_birth") ? String(fd.get("date_of_birth")) : null;
          await putJson("/api/babies/" + babyEditId, body);
          exitBabyEdit();
          toast(i18n("Updated"));
          // Sex + birth date drive the age line, WHO bands and both
          // percentile lines — refresh the profile before the measure
          // groups re-render under it.
          try { profileData = ((await fetchJson("/api/profile")) || {}).baby || null; } catch (_) {}
          loadList("weights");
          loadList("heights");
        } else {
          if (fd.get("sex")) body.sex = String(fd.get("sex"));
          if (fd.get("date_of_birth")) body.date_of_birth = String(fd.get("date_of_birth"));
          await postJson("/api/babies", body);
          form.reset();
          toast(i18n("Saved"));
        }
        loadSettings();
        // The header switcher shows up once the household has two babies
        // (and re-labels after a rename).
        loadDashboard();
      } catch (err) {
        toastErr(err);
      } finally {
        btn.disabled = false;
      }
    });

    document.getElementById("form-invite").addEventListener("submit", async function(e) {
      e.preventDefault();
      var form = e.currentTarget;
      var fd = new FormData(form);
      var email = String(fd.get("email") || "").trim();
      if (!email) return;
      var btn = form.querySelector("button[type=submit]");
      btn.disabled = true;
      try {
        await postJson("/api/caregivers", { email: email });
        form.reset();
        toast(i18n("Invited {e}", { e: email.toLowerCase() }));
        loadSettings();
      } catch (err) {
        toastErr(err);
      } finally {
        btn.disabled = false;
      }
    });

    // One aggregated fetch (the server batches the queries in a single D1
    // round trip); the payload is cached so the periodic re-render can keep
    // the "ago" strings fresh without refetching. While the tape is
    // jump-extended into deep history, every refetch keeps asking for the
    // deeper strip window, so the periodic re-render never hollows it out.
    // Returns whether fresh data actually landed (a jump awaiting deep
    // history falls back to the cached payload when it didn't).
    async function loadDashboard() {
      try {
        dashboardData = await fetchJson("/api/dashboard" +
          (stripFetchDays ? "?strip_days=" + stripFetchDays : ""));
        syncBabies(dashboardData);
        renderDashboard();
        return true;
      } catch (err) {
        toastErr(err, "Error loading dashboard: {e}");
        return false;
      }
    }

    function renderDashboard() {
      if (!dashboardData) return;
      var d = dashboardData;
      renderStrip(d);
      var recent = d.recent_feedings || [];
      if (recent[0]) {
        var amtInput = document.querySelector('form[data-entity="feedings"] input[name="amount_ml"]');
        if (amtInput) amtInput.placeholder = recent[0].amount_ml;
      }
    }

    // Strip geometry, shared by render and scroll math: RS_DAYS days ending
    // today, minutes 0..RS_MIN (0 = midnight two days ago, Madrid) mapped to
    // x = RS_PAD .. RS_PAD+RS_AXIS in an RS_VB-unit-wide viewBox. Px per
    // viewBox unit is FIXED (RS_UPX) so dots/type/height never change size;
    // density comes from giving the axis more units: the viewport always
    // shows a fixed slice of tape — 12 h on wide screens, 4 h on narrow
    // ones, where a fingertip swipe must move the marker in finer steps.
    var RS_BASE_DAYS = 3, RS_MAX_DAYS = 366, RS_PAD = 10, RS_DAY_W = 460;
    var RS_DAYS = RS_BASE_DAYS;
    var RS_MIN = RS_DAYS * 1440;
    var RS_AXIS0 = RS_DAYS * RS_DAY_W; // base axis units (scale floor)
    // Frozen at the base tape's value on purpose: a readout jump that
    // extends RS_DAYS must lengthen the tape, not shrink its glyphs.
    var RS_UPX = 2560 / (RS_AXIS0 + 2 * RS_PAD); // px per viewBox unit
    var RS_AXIS = RS_AXIS0;
    // Re-point the tape's day span (readout jumps extend it into the past;
    // riding "now" again folds it back). RS_AXIS/RS_VB/stripPx re-derive on
    // the next rsSetScale, which every render runs first.
    function rsSetDays(n) {
      RS_DAYS = n;
      RS_MIN = RS_DAYS * 1440;
      RS_AXIS0 = RS_DAYS * RS_DAY_W;
    }
    var RS_VB = RS_AXIS + 2 * RS_PAD;
    var stripPx = RS_VB * RS_UPX; // px width of the full axis at this scale
    var RS_VPMIN = 720; // minutes of tape per viewport, set by rsSetScale
    function rsSetScale(cw) {
      if (!cw) return; // hidden/unmeasurable: keep the last scale
      RS_VPMIN = cw < 640 ? 240 : 720; // matches the app's mobile breakpoint
      RS_AXIS = Math.max(RS_AXIS0, cw * RS_MIN / (RS_VPMIN * RS_UPX));
      RS_VB = RS_AXIS + 2 * RS_PAD;
      stripPx = RS_VB * RS_UPX;
    }
    function rsX(min) { return RS_PAD + (min / RS_MIN) * RS_AXIS; }
    // Wall-clock ms of the strip's first midnight; wall space is continuous
    // (fromWall re-applies the DST offset), so day arithmetic is safe.
    function rsStartWallMs() {
      var w = toWall(new Date());
      w.setUTCHours(0, 0, 0, 0);
      return w.getTime() - (RS_DAYS - 1) * DAY_MS;
    }
    function rsNowMin() {
      return Math.floor((toWall(new Date()).getTime() - rsStartWallMs()) / 60000);
    }

    // Tape-head model: the marker is fixed 48px in from the viewport's
    // right edge and the scroll position IS the picked time — the leading
    // flex spacer matches the needle's left offset, so the svg x under the
    // needle equals scrollLeft. While the tape sits pushed against the
    // "now" clamp it follows now across re-renders.
    var stripFollowNow = true;
    var stripChoice = null;    // quick-add awaiting a kind/name/amount pick
    var stripAmt = 0;          // feed amount being stepped in the pick row
    var stripBusy = false;     // a quick-add/edit request is in flight
    var stripEdit = null;      // { entity, id } armed by a list-row tap
    var stripDelPending = false; // edit-mode Delete waiting for its confirm tap
    var stripEditReturn = null;  // marker berth to restore when the edit ends
    var stripEditMoved = false;  // tape scrubbed since arming → commits re-time
    var stripEditAnchorMin = null; // armed record's exact minute: snap-grid anchor while editing
    var stripJumpAnchorMin = null; // last jump target: snap-grid anchor until the tape rides "now"
    var stripFetchDays = 0;      // deep-history window to request (0 = the server default)
    var stripSetLeft = -1;       // last scrollLeft set by code, not the user
    var stripDragId = null;    // active mouse/pen tape-drag pointer
    var stripDragX = 0, stripDragLeft = 0, stripDragMoved = false;
    // Fling state for mouse/pen drags (touch gets native momentum): release
    // velocity is sampled during the drag and decays in a rAF loop.
    var stripVel = 0, stripVelT = 0, stripLastX = 0, stripMomentum = null;

    function stripStopMomentum() {
      if (stripMomentum !== null) {
        cancelAnimationFrame(stripMomentum);
        stripMomentum = null;
      }
    }

    // iOS-feel inertia: exponential decay (τ≈325 ms), stopped by the day
    // clamps or by grabbing the tape again. v is scrollLeft px/ms; each
    // frame's scroll fires the clamp/label handlers as usual.
    function stripStartMomentum(v) {
      stripStopMomentum();
      var last = performance.now();
      function step(t) {
        stripMomentum = null;
        var sc = stripScroller();
        if (!sc || !sc.querySelector(".rhythm-strip")) return;
        var dt = Math.min(t - last, 64);
        last = t;
        sc.scrollLeft += v * dt;
        v *= Math.exp(-dt / 325);
        var lo = rsScrollFor(sc, 0);
        var hi = rsScrollFor(sc, rsNowMin());
        if (Math.abs(v) > 0.02 && sc.scrollLeft > lo && sc.scrollLeft < hi) {
          stripMomentum = requestAnimationFrame(step);
        }
      }
      stripMomentum = requestAnimationFrame(step);
    }

    function stripScroller() { return document.querySelector("#today-strip .rhythm-scroll"); }

    // Scroll offset for a given minute (svg px), i.e. what scrollLeft must be
    // for that minute to sit under the marker. Uses the render-time scale
    // stripPx (the tape element is cropped at "now", so its measured width
    // is NOT the full-axis width).
    function rsScrollFor(sc, min) {
      return rsX(min) / RS_VB * stripPx;
    }

    // Snapped when scrolled back so the distance from now is a multiple of
    // 10 minutes (the label reads "2h 20m ago", never "2h 13m ago"); exact
    // when riding "now". While a record is armed for edit, the grid anchors
    // on the record's own timestamp instead: parked on it, the marker reads
    // back its exact time (seconds included), and scrubs step ±10 min from
    // it — 14:33:03 moves to 14:23:03, never 14:30 — so a commit can only
    // move the time deliberately, in clean relative steps. A readout jump
    // anchors the grid the same way on the typed moment (parked there, the
    // dial reads back exactly what was typed) until the tape rides "now".
    function stripMarkerMin() {
      var sc = stripScroller();
      if (!sc || !sc.querySelector(".rhythm-strip")) return rsNowMin();
      var raw = (sc.scrollLeft / stripPx * RS_VB - RS_PAD) / RS_AXIS * RS_MIN;
      var now = rsNowMin();
      // Half a grid step of slack: scrollLeft is floored to whole px (~1.7
      // min here), so a tape parked on "now" can read fractionally early.
      if (raw >= now - 5) return now;
      var anchor = stripEditAnchorMin != null ? stripEditAnchorMin
        : stripJumpAnchorMin != null ? stripJumpAnchorMin : now;
      var diff = Math.round((anchor - raw) / 10) * 10;
      return Math.max(0, Math.min(now, anchor - diff));
    }

    // The instant the marker points at (strip minutes past the first
    // midnight). Rounded to whole ms: the edit anchor is a ratio, and float
    // dust must not turn a 14:23:03.000 re-time into 14:23:02.999.
    function markerInstant() {
      return fromWall(rsStartWallMs() + Math.round(stripMarkerMin() * 60000));
    }

    // The dial's big line for a moment diffMin minutes back: "Now" at (or
    // past) the clamp, else "{d} ago". Unlike durationLabel, zero sections
    // are never dropped and inner ones are zero-padded ("1h 00m",
    // "1d 09h 50m"): while the value slides, "2h" ↔ "2h 10m" ↔ "2h 9m"
    // would make the label flicker in width.
    function stripAgoLabel(diffMin) {
      if (diffMin <= 0) return i18n("Now");
      var days = Math.floor(diffMin / 1440), rest = diffMin % 1440;
      var hrs = Math.floor(rest / 60), mins = rest % 60;
      var dur = days
        ? days + "d " + pad2(hrs) + "h " + pad2(mins) + "m"
        : hrs ? hrs + "h " + pad2(mins) + "m" : mins + "m";
      return i18n("{d} ago", { d: dur });
    }

    // "Yesterday<sep>22:05" — the marker's absolute label (clock time alone
    // once the marker is inside today). Shared by the tape readout and the
    // milk readout's eyebrow so the two can never disagree.
    function markerAbsLabel(sep) {
      var m = stripMarkerMin(), t = formatTimeOfDay(markerInstant());
      return m >= (RS_DAYS - 1) * 1440 ? t
        : relDayLabel(fromWall(rsStartWallMs() + Math.floor(m / 1440) * DAY_MS)) + sep + t;
    }

    // Every programmatic tape move goes through here so the scroll handler
    // can tell them from the user's own scrubbing (drag/fling/native pan all
    // set scrollLeft without updating stripSetLeft). Read back after setting:
    // the browser clamps the assignment to the scrollable range.
    function stripSetScroll(sc, left) {
      sc.scrollLeft = left;
      stripSetLeft = sc.scrollLeft;
    }

    // Park the marker on a strip minute (the scroll handler clamps it).
    function stripScrollToMin(min) {
      var sc = stripScroller();
      if (!sc || !sc.querySelector(".rhythm-strip")) return;
      stripStopMomentum();
      stripSetScroll(sc, rsScrollFor(sc, min));
    }

    // Send the marker back to where it sat before the edit session began.
    // A "follow now" berth restores to the live now, not the stale minute.
    function stripEditRestore() {
      stripEditAnchorMin = null; // back to the now-anchored grid
      if (!stripEditReturn) return;
      var r = stripEditReturn;
      stripEditReturn = null;
      stripScrollToMin(r.followNow ? rsNowMin() : r.min);
    }

    // What the last full render derived its geometry from: the tape's
    // first-midnight anchor and the viewport width behind the scale. The
    // 30 s tick compares the live values against these to know when an
    // in-place nudge isn't enough (midnight re-anchors the whole axis, a
    // resize re-derives the scale) and a full render is due.
    var stripRenderedStart = 0, stripRenderedW = 0;

    function renderStrip(d) {
      if (stripDragId !== null) return; // mid-drag: don't yank the tape
      // A record armed for edit may be gone from this payload (deleted on
      // another device): disarm and send the marker home *before* the scroll
      // position is read, so the restored berth is what gets carried over.
      if (stripEdit && !findStripItem(d, stripEdit.entity, stripEdit.id)) {
        stripEdit = null;
        stripDelPending = false;
        stripEditRestore();
      }
      var el = document.getElementById("today-strip");
      var prev = el.querySelector(".rhythm-scroll");
      var prevLeft = prev ? prev.scrollLeft : -1;
      // Scroll→minute is affine (the RS_PAD offset), so carrying a position
      // across a possible scale change must go through the minute, not a
      // bare scrollLeft ratio.
      var prevMin = prevLeft < 0 ? -1
        : (prevLeft / stripPx * RS_VB - RS_PAD) / RS_AXIS * RS_MIN;
      // A jump-extended tape folds back to the base days once the marker
      // rides "now" again — its deep SVG is heavy to keep rebuilding, and
      // the user has come home. Held while a pick/edit is open (an armed
      // record may live in the extension).
      if (RS_DAYS > RS_BASE_DAYS && stripFollowNow && !stripEdit && !stripChoice) {
        rsSetDays(RS_BASE_DAYS);
        stripFetchDays = 0; // the next refetch drops back to the default window
      }
      var cw = (prev || el).clientWidth;
      rsSetScale(cw);
      stripRenderedStart = rsStartWallMs();
      if (cw) stripRenderedW = cw; // hidden/unmeasurable: keep the last width
      hideTapTip(); // an open tap caption would outlive its rebuilt anchor
      el.innerHTML = rhythmStripHtml(d) + '<div class="strip-compare"></div>' + stripTargetsHtml(d) +
        stripActionsHtml(d) + '<div class="strip-list"></div>';
      var sc = el.querySelector(".rhythm-scroll");
      // Glued to "now" until the user scrolls back in time; a scrolled-back
      // tape keeps its position across re-renders (30 s tick, refetches).
      stripSetScroll(sc, rsScrollFor(sc, (stripFollowNow || prevLeft < 0) ? rsNowMin() : prevMin));
      updateStripMarker();
    }

    // The last RS_DAYS days as one continuous axis (Madrid wall time), tall
    // enough to be the tab's whole surface: one lane per domain with events
    // as dots, night hours shaded (the Settings-defined window, default
    // 21:00–07:00, merged across midnight),
    // hairlines + date captions at each midnight, hourly ticks under the
    // axis, and a cursor at "now" riding the tape; the fixed tape-head
    // marker is an HTML overlay on the wrap, outside the scroller.
    function rhythmStripHtml(d) {
      function x(min) { return rsX(min).toFixed(1); }
      var startWall = rsStartWallMs();
      function evMin(ts) {
        return Math.floor((toWall(new Date(ts)).getTime() - startWall) / 60000);
      }
      // Mark tooltip time: deep-history marks (before the tape's last full day)
      // carry the full date, today/yesterday marks just the time. One rule for
      // every lane (gauges, diapers, routines) so they can't drift apart.
      function markWhen(ts, m) {
        return m < (RS_DAYS - 2) * 1440 ? absoluteTs(ts) : formatTimeOfDay(new Date(ts));
      }
      var LANES = { feed: 38, diaper: 66, routine: 94 };
      var nowMin = rsNowMin();
      // viewBox starts at y=14 (the band above, the old day-stamp strip, is
      // empty — cropping it keeps the readout close to the tape) and ENDS at
      // "now": the element takes no scroll width beyond it, so the browser's
      // own scroll limit stops the marker exactly at "now" — no JS
      // clamp fighting native touch momentum. The rest of today still paints
      // through overflow:visible; it's just not scrollable-to.
      var vbw = rsX(nowMin);
      var svg = '<svg class="rhythm-strip" style="width:' + (vbw / RS_VB * stripPx).toFixed(1) +
        'px" viewBox="0 14 ' + vbw.toFixed(1) + ' 124" role="img">';
      svg += '<defs><linearGradient id="rs-ng">' +
        '<stop offset="0" class="rs-night-stop" stop-opacity="0"/>' +
        '<stop offset="0.12" class="rs-night-stop"/>' +
        '<stop offset="0.88" class="rs-night-stop"/>' +
        '<stop offset="1" class="rs-night-stop" stop-opacity="0"/>' +
        '</linearGradient></defs>';
      var dayI;
      for (dayI = -1; dayI < RS_DAYS; dayI++) {
        var ns = Math.max(0, dayI * 1440 + nightStartMin);
        var ne = Math.min(RS_MIN, dayI * 1440 + nightStartMin + nightDurMin());
        if (ne > ns) {
          svg += '<rect class="rs-night" x="' + x(ns) + '" y="20" width="' +
            ((ne - ns) / RS_MIN * RS_AXIS).toFixed(1) + '" height="92"/>';
        }
      }
      var lane;
      for (lane in LANES) {
        svg += '<line class="rs-lane" x1="' + x(0) + '" y1="' + LANES[lane] + '" x2="' + x(RS_MIN) + '" y2="' + LANES[lane] + '"/>';
      }
      // Half-hour ticks, taller on the hour, on both scales. Hour numerals
      // stay sparse: every 2 h on the 12 h (desktop) viewport — the hourly
      // tall ticks carry the in-between beats — hourly on the 4 h (mobile)
      // one, where skipping would leave the viewport nearly unlabelled.
      // Jump-extended tapes drop the half-hour beats (hour ticks only):
      // element count scales with days, and a weeks-long SVG rebuilt every
      // 30 s must stay light.
      var labelEvery = RS_VPMIN > 240 ? 2 : 1;
      var tickStep = RS_DAYS > 7 ? 1 : 0.5;
      var h;
      for (h = 0; h <= RS_DAYS * 24; h += tickStep) {
        var tall = h % 1 === 0;
        svg += '<line class="rs-tick' + (tall ? " h3" : "") + '" x1="' + x(h * 60) + '" y1="114" x2="' + x(h * 60) +
          '" y2="' + (tall ? 121 : 118) + '"/>';
        if (h % labelEvery === 0 && h % 24 !== 0) {
          svg += '<text class="rs-hour" x="' + x(h * 60) + '" y="131">' + (h % 24) + '</text>';
        }
      }
      // Day stamps sit in the axis band with the hour numerals, centred on
      // their midnight tick (midnights carry no hour label). Relative like
      // the rest of the readout — Today / Yesterday, weekday beyond that,
      // and past a week (only reachable on a jump-extended tape) the
      // weekday alone goes ambiguous, so the date rides along.
      // The first one centres on the tape edge — the svg overflows visibly
      // so it isn't clipped.
      for (dayI = 0; dayI < RS_DAYS; dayI++) {
        var dt = new Date(startWall + dayI * DAY_MS);
        var dayLbl = dayI === RS_DAYS - 1 ? i18n("Today")
          : dayI === RS_DAYS - 2 ? i18n("Yesterday")
          : weekdayLabel(dt) +
            (RS_DAYS - 1 - dayI > 6
              ? " " + pad2(dt.getUTCDate()) + "/" + pad2(dt.getUTCMonth() + 1) : "");
        svg += '<text class="rs-day" x="' + x(dayI * 1440) + '" y="131">' +
          escapeHtml(dayLbl) + '</text>';
        if (dayI > 0) {
          svg += '<line class="rs-mid" x1="' + x(dayI * 1440) + '" y1="20" x2="' + x(dayI * 1440) + '" y2="112"/>';
        }
      }
      svg += '<text class="rs-hour" x="' + x(RS_MIN) + '" y="131">24</text>';
      // Feed marks are bottle gauges centered on the feed lane (the user's
      // pick over standing on it): one fixed 10x18 hairline vessel per
      // feed, corners rounded rx=3 (the user's explicit ask, the tape's
      // one sanctioned exception to the squared language — it's a bottle),
      // on an opaque bg backing so the lane hairline and night wash never
      // cross the bottle (also the user's ask — no ghost here). The
      // feed-hue fill level is the milk — level is linear in ml so half a
      // bottle IS half the milk, with a 1.5-unit sliver floor so a token
      // feed still shows; back, fill and clip all reuse the one vessel
      // shape, the clip keeping the liquid's bottom on the rounded corners
      // while its top surface stays flat. Taps keep working: the tape
      // click handler measures to each mark's bounding-box center — now
      // the lane itself — with its fixed 24px reach.
      var GA_W = 10, GA_H = 18, GA_RX = 3;
      // "Full" = the baby's own ceiling: the biggest feed of the past 14
      // days, so the scale grows with the baby — a newborn's 90 ml tops
      // the vessel today, a 210 ml bottle does at six months (240 ml
      // stands in until a first feed exists). The strip window always
      // reaches ≥17 days back, so the payload covers the whole window;
      // the list is newest-first, so the scan stops at the cutoff. Deep
      // (jump-extended) history is measured against the current ceiling
      // on purpose: the tape answers "how big was that feed for the baby
      // *now*", and one scale must hold across the whole tape anyway.
      var gfMax = 0, gfCut = Date.now() - 14 * DAY_MS, gfFeeds = d.strip_feedings || [], gfi;
      for (gfi = 0; gfi < gfFeeds.length; gfi++) {
        if (new Date(gfFeeds[gfi].ts).getTime() < gfCut) break;
        if (gfFeeds[gfi].amount_ml > gfMax) gfMax = gfFeeds[gfi].amount_ml;
      }
      var GA_FULL = gfMax || 240;
      function gauges(items) {
        var out = "", i;
        for (i = 0; i < items.length; i++) {
          var m = evMin(items[i].ts);
          if (m < 0 || m > RS_MIN) continue;
          var whenS = markWhen(items[i].ts, m);
          var gx = (x(m) - GA_W / 2).toFixed(1);
          var gy = LANES.feed - GA_H / 2;
          var fh = Math.max(1.5, Math.min(GA_H, GA_H * (items[i].amount_ml || 0) / GA_FULL));
          var vessel = 'x="' + gx + '" y="' + gy + '" width="' + GA_W + '" height="' + GA_H + '" rx="' + GA_RX + '"';
          out += '<g class="rs-gauge" data-entity="feedings" data-id="' + escapeHtml(String(items[i].id)) + '">' +
            '<title>' + escapeHtml(whenS + " · " + items[i].amount_ml + " ml") + '</title>' +
            '<clipPath id="rsgv' + i + '"><rect ' + vessel + '/></clipPath>' +
            '<rect class="rs-gauge-back" ' + vessel + '/>' +
            '<rect class="rs-gauge-fill" clip-path="url(#rsgv' + i + ')" x="' + gx +
            '" y="' + (gy + GA_H - fh).toFixed(1) + '" width="' + GA_W + '" height="' + fh.toFixed(1) + '"/>' +
            '<rect class="rs-gauge-body" ' + vessel + '/>' +
            '</g>';
        }
        return out;
      }
      // Diaper marks split by kind (the user's pick over solid-icon and
      // bare-ring variants): poop keeps the solid ochre dot, pee is a
      // hairline droplet outline in the same ochre — icon AND fill carry
      // the split, because at tape size two mostly-round solid silhouettes
      // blur together. The droplet is no ghost: its opaque bg fill is its
      // own backing (bottle treatment), so the lane hairline and night
      // wash never cross it. Tip up, round belly on the lane; bbox 9x13.5
      // so its mass matches the r=5 dot. Taps keep working — the click
      // handler measures to bounding-box centers, shape-blind.
      var DROP_D = "M0 -7C2.2 -3.2 4.5 -0.8 4.5 2A4.5 4.5 0 1 1 -4.5 2C-4.5 -0.8 -2.2 -3.2 0 -7Z";
      // One change can hold both: pee and poop are separate records, and
      // logged together they'd z-fight on one tape spot (the droplet's
      // opaque fill can swallow the dot outright). A poop within 15
      // minutes of a pee nests inside that droplet instead — a small
      // solid dot in the belly, a composed "both" sign built from the two
      // the eye already knows. The nested dot keeps its own id and title
      // and draws right after its droplet so the backing never covers it;
      // it sits at the droplet's own x, since at nesting distance the
      // offset is below tape reading precision. The pair's bbox centers
      // stay ~4px apart, so the click handler still tells them apart
      // (belly side favors the poop, tip side the pee).
      function diaperMarks(items) {
        var out = "", i, j, mins = [], hostOf = {}, isNested = {};
        for (i = 0; i < items.length; i++) mins[i] = evMin(items[i].ts);
        for (i = 0; i < items.length; i++) {
          if (items[i].kind !== "poop" || mins[i] < 0 || mins[i] > RS_MIN) continue;
          for (j = 0; j < items.length; j++) {
            if (items[j].kind !== "pee" || hostOf[j] !== undefined ||
                mins[j] < 0 || mins[j] > RS_MIN || Math.abs(mins[i] - mins[j]) > 15) continue;
            hostOf[j] = i;
            isNested[i] = true;
            break;
          }
        }
        function meta(it, m) {
          var whenS = markWhen(it.ts, m);
          return 'data-entity="diapers" data-id="' + escapeHtml(String(it.id)) + '">' +
            '<title>' + escapeHtml(whenS + " · " + fmtKind(it.kind)) + '</title>';
        }
        for (i = 0; i < items.length; i++) {
          var m = mins[i];
          if (m < 0 || m > RS_MIN || isNested[i]) continue;
          if (items[i].kind === "pee") {
            out += '<path class="rs-drop" transform="translate(' + x(m) + ' ' + LANES.diaper + ')" d="' + DROP_D + '" ' + meta(items[i], m) + '</path>';
            if (hostOf[i] !== undefined) {
              j = hostOf[i];
              out += '<circle class="rs-dot diaper" cx="' + x(m) + '" cy="' + (LANES.diaper + 2) + '" r="2.8" ' + meta(items[j], mins[j]) + '</circle>';
            }
          } else {
            out += '<circle class="rs-dot diaper" cx="' + x(m) + '" cy="' + LANES.diaper + '" r="5" ' + meta(items[i], m) + '</circle>';
          }
        }
        return out;
      }
      // Known routines wear a pictogram (the user's pick over presets-only
      // and letter monograms): sun = Vitamin D, waves = Bath, lying bar =
      // Tummy, medical cross = any of the four medicine names (the glance
      // says "medicine", the tooltip says which). Walk, Massage and custom
      // names keep the solid dot — nine-plus silhouettes in one hue at
      // tape size would blur; four stay tellable apart. Keyed by the
      // canonical stored English name, so display localization never
      // touches the mapping (hasOwnProperty guards a custom routine named
      // like an Object.prototype member). Each glyph rides an opaque bg
      // disc (bottle treatment) so the lane hairline never threads through
      // its strokes. Glyph shapes are local coords around the lane center,
      // sized to the r=5 dot's visual mass.
      var RTN_SUN = '<path class="rs-rtn-stroke" d="M4 0H5.8M2.8 2.8L4.1 4.1M0 4V5.8M-2.8 2.8L-4.1 4.1M-4 0H-5.8M-2.8 -2.8L-4.1 -4.1M0 -4V-5.8M2.8 -2.8L4.1 -4.1"/><circle class="rs-rtn-fill" r="2.6"/>';
      var RTN_WAVES = '<path class="rs-rtn-stroke" d="M-5.5 -2.2Q-2.75 -4.4 0 -2.2T5.5 -2.2M-5.5 2.2Q-2.75 0 0 2.2T5.5 2.2"/>';
      var RTN_BAR = '<rect class="rs-rtn-fill" x="-6" y="-2.25" width="12" height="4.5"/>';
      var RTN_CROSS = '<path class="rs-rtn-fill" d="M-1.8 -5.5H1.8V-1.8H5.5V1.8H1.8V5.5H-1.8V1.8H-5.5V-1.8H-1.8Z"/>';
      var RTN_GLYPHS = {
        "Vitamin D": RTN_SUN, "Bath": RTN_WAVES, "Tummy": RTN_BAR,
        "Paracetamol": RTN_CROSS, "Ibuprofen": RTN_CROSS, "Syrup": RTN_CROSS, "Cream": RTN_CROSS
      };
      function routineMarks(items) {
        var out = "", i;
        for (i = 0; i < items.length; i++) {
          var m = evMin(items[i].ts);
          if (m < 0 || m > RS_MIN) continue;
          var whenS = markWhen(items[i].ts, m);
          var meta = 'data-entity="routines" data-id="' + escapeHtml(String(items[i].id)) + '">' +
            '<title>' + escapeHtml(whenS + " · " + fmtRoutine(items[i].name)) + '</title>';
          var glyph = RTN_GLYPHS.hasOwnProperty(items[i].name) ? RTN_GLYPHS[items[i].name] : null;
          out += glyph
            ? '<g class="rs-rtn" transform="translate(' + x(m) + ' ' + LANES.routine + ')" ' + meta +
              '<circle class="rs-rtn-back" r="7"/>' + glyph + '</g>'
            : '<circle class="rs-dot routine" cx="' + x(m) + '" cy="' + LANES.routine + '" r="5" ' + meta + '</circle>';
        }
        return out;
      }
      svg += gauges(d.strip_feedings || []);
      svg += diaperMarks(d.strip_diapers || []);
      svg += routineMarks(d.strip_routines || []);
      // Both tape limits read as fog, not lines: an eased fade over ~30 min
      // of tape (~50 px at either scale) reaches full opacity, so the future
      // past "now" — and, mirrored, the moments before the tape's first
      // midnight — are completely hidden beyond it (pad spread). The scroll
      // crop already stops the marker at now — the fog only paints over
      // regions the marker can't dwell on anyway.
      svg += '<defs><linearGradient id="rs-fg" gradientUnits="userSpaceOnUse" x1="' +
        x(nowMin) + '" x2="' + x(nowMin + 30) + '" y1="0" y2="0">' +
        '<stop offset="0" class="rs-fog-stop" stop-opacity="0"/>' +
        '<stop offset="0.35" class="rs-fog-stop" stop-opacity="0.55"/>' +
        '<stop offset="1" class="rs-fog-stop" stop-opacity="1"/>' +
        '</linearGradient>' +
        '<linearGradient id="rs-fg0" gradientUnits="userSpaceOnUse" x1="' +
        x(0) + '" x2="' + x(30) + '" y1="0" y2="0">' +
        '<stop offset="0" class="rs-fog-stop" stop-opacity="1"/>' +
        '<stop offset="0.65" class="rs-fog-stop" stop-opacity="0.55"/>' +
        '<stop offset="1" class="rs-fog-stop" stop-opacity="0"/>' +
        '</linearGradient></defs>' +
        '<rect class="rs-fog rs-fog-now" x="' + x(nowMin) + '" y="14" width="' + (RS_VB - rsX(nowMin)).toFixed(1) +
        '" height="124" fill="url(#rs-fg)"/>' +
        // -24: also blanket the first day stamp's overflow left of x=0
        '<rect class="rs-fog" x="-24" y="14" width="' + (rsX(30) + 24).toFixed(1) +
        '" height="124" fill="url(#rs-fg0)"/>';
      // The dial doubles as the door to a moment: tapping it opens the
      // jump-to-a-date/time dialog (stripJumpOpen).
      var jumpLbl = i18n("Jump to a date and time");
      return '<div class="rhythm-wrap">' +
        '<div class="rs-readout">' +
          '<button type="button" class="rs-readout-btn" data-strip="jump-open"' +
            ' title="' + escapeHtml(jumpLbl) + '" aria-label="' + escapeHtml(jumpLbl) + '">' +
            '<span class="rs-readout-rel"></span>' +
            '<span class="rs-readout-abs"></span>' +
          '</button>' +
        '</div>' +
        '<div class="rs-tape">' +
          '<div class="rhythm-scroll">' + svg + '</svg></div>' +
          '<div class="rs-marker-ov"><span class="rs-marker-ov-line"></span><span class="rs-marker-ov-tri"></span></div>' +
        '</div></div>';
    }

    // The jump dialog's content: a Madrid-wall date+time form prefilled
    // with the marker's moment. Committing parks the marker on the typed
    // instant — extending the tape into deeper history when the date
    // predates it — which is how records older than the base 3-day tape get
    // seen at all. The date input is fenced to [birth (or the tape's hard
    // cap), today]; the commit clamps again anyway.
    function stripJumpHtml() {
      var w = toWall(markerInstant());
      var maxDs = madridDateStr(new Date());
      var capW = toWall(new Date());
      capW.setUTCHours(0, 0, 0, 0);
      var minDs = new Date(capW.getTime() - (RS_MAX_DAYS - 1) * DAY_MS)
        .toISOString().slice(0, 10);
      var first = stripFirstDateStr();
      if (first && first > minDs) minDs = first;
      else if (!first) minDs = maxDs; // nothing logged yet: today is all there is
      return '<div class="rs-jump-title">' + escapeHtml(i18n("Jump to a date and time")) + '</div>' +
        '<form class="rs-jump">' +
        '<label class="rs-jump-field">' +
          '<span class="rs-jump-lbl">' + escapeHtml(i18n("Date")) + '</span>' +
          '<input type="date" name="d" required value="' + w.toISOString().slice(0, 10) +
            '" min="' + minDs + '" max="' + maxDs + '">' +
        '</label>' +
        '<label class="rs-jump-field">' +
          '<span class="rs-jump-lbl">' + escapeHtml(i18n("Time")) + '</span>' +
          '<input type="time" name="t" required value="' +
            pad2(w.getUTCHours()) + ":" + pad2(w.getUTCMinutes()) + '">' +
        '</label>' +
        '<button type="submit" class="strip-btn rs-jump-go">' +
          '<span class="rs-jump-arrow">&rarr;</span>' + escapeHtml(i18n("Go")) + '</button>' +
        '<button type="button" class="strip-btn strip-cancel" data-jump="cancel">' +
          '<span class="strip-x">&times;</span>' + escapeHtml(i18n("Cancel")) + '</button>' +
      '</form>';
    }

    // Madrid day of the baby's earliest tape record ("YYYY-MM-DD"), or null
    // before anything has been logged. The jump has no business earlier —
    // there is nothing on the tape to see.
    function stripFirstDateStr() {
      var t = dashboardData && dashboardData.first_ts;
      return t ? madridDateStr(new Date(t)) : null;
    }

    function stripJumpDialog() { return document.getElementById("jump-dialog"); }

    // Open the dialog with a freshly built form. Living outside the strip,
    // it survives the 30 s re-renders untouched, and being modal it keeps
    // the tape (and the quick-add row) out of reach until it closes.
    function stripJumpOpen() {
      var dlg = stripJumpDialog();
      if (!dlg || dlg.open || !dashboardData) return;
      dlg.innerHTML = stripJumpHtml();
      dlg.showModal(); // focuses the date input (the first focusable)
    }

    // Parse the form's moment as Madrid wall time and clamp it into
    // [the first record's day (or the tape's hard cap), now]. Null while a
    // field is empty/invalid (required validation owns that case).
    function stripJumpParse(form) {
      var dm = /^(\d{4})-(\d{2})-(\d{2})$/.exec(form.querySelector('input[name="d"]').value);
      var tm = /^(\d{1,2}):(\d{2})/.exec(form.querySelector('input[name="t"]').value);
      if (!dm || !tm) return null;
      var wallMs = Date.UTC(+dm[1], +dm[2] - 1, +dm[3], +tm[1], +tm[2]);
      var nowWallMs = toWall(new Date()).getTime();
      var todayW = new Date(nowWallMs);
      todayW.setUTCHours(0, 0, 0, 0);
      var floorMs = todayW.getTime() - (RS_MAX_DAYS - 1) * DAY_MS;
      var first = stripFirstDateStr();
      floorMs = first ? Math.max(floorMs, Date.parse(first + "T00:00:00Z"))
        : todayW.getTime(); // nothing logged yet: no past to jump to
      return {
        wallMs: Math.max(floorMs, Math.min(nowWallMs, wallMs)),
        nowWallMs: nowWallMs,
        todayMidMs: todayW.getTime()
      };
    }

    // Commit: take the parsed/clamped moment, grow the tape (and the
    // fetched history window — the milk gauge reads 15 days behind wherever
    // the marker can sit) when the moment predates them, then park the
    // marker exactly there.
    async function stripJumpGo(form) {
      var p = stripJumpParse(form);
      if (!p) return; // required inputs make this unreachable-ish
      var wallMs = p.wallMs;
      var nowWallMs = p.nowWallMs;
      var todayW = new Date(p.todayMidMs);
      var targetW = new Date(wallMs);
      targetW.setUTCHours(0, 0, 0, 0);
      // +1 turns the day gap into a day count; the extra margin day keeps
      // the evening *before* the target scrubbable (night context straddles
      // midnight), instead of pinning the target against the tape's start.
      var needDays = Math.min(RS_MAX_DAYS,
        Math.round((todayW.getTime() - targetW.getTime()) / DAY_MS) + 2);
      if (needDays > RS_DAYS) rsSetDays(needDays);
      // The marker only reaches the target after the re-render below, so a
      // tape still riding "now" must shed that state first — otherwise the
      // render's fold-back would undo the extension it is rendering.
      if (wallMs < nowWallMs) stripFollowNow = false;
      // Jumping while a record is armed is a deliberate time move — the
      // same contract as scrubbing the tape, so the commit will re-time.
      if (stripEdit) stripEditMoved = true;
      var needFetch = needDays + 15;
      if (needFetch > Math.max(stripFetchDays, 18)) {
        // Deep history first: the dialog stays up, controls disabled, as
        // the busy state — it closes when the extended tape is ready.
        var ctl = form.querySelectorAll("input, button"), ci;
        for (ci = 0; ci < ctl.length; ci++) ctl[ci].disabled = true;
        stripFetchDays = needFetch;
        // On success this re-rendered the extended tape; on failure render
        // it anyway from the cached payload — a thin tape with honest gaps
        // beats geometry that no longer matches RS_DAYS.
        if (!(await loadDashboard())) renderStrip(dashboardData);
      } else {
        renderStrip(dashboardData);
      }
      stripJumpDialog().close();
      // Anchor the snap grid on the typed minute (edits keep precedence) so
      // the dial reads back exactly what was asked for, then park there.
      stripJumpAnchorMin = Math.round((wallMs - rsStartWallMs()) / 60000);
      stripScrollToMin(stripJumpAnchorMin);
      updateStripMarker();
    }

    // Quick-add row under the strip: each button swaps the row for its pick —
    // feed steps an amount ±10 from the last feed, diaper/routine show their
    // domain's choice set. The center/choice tap logs at the marker's time.
    // [value, i18n label key] per choice — the strip is the only composer now
    // (the Feeding/Diaper/Routine tabs whose forms used to carry these are
    // gone), so it owns the option sets.
    var STRIP_CHOICES = {
      diapers: [["pee", "Pee"], ["poop", "Poop"]],
      routines: [["Vitamin D", "Vitamin D"], ["Bath", "Bath"], ["Tummy", "Tummy"]]
    };
    // The armed record's fresh row from the dashboard payload — the payload is
    // refetched around every save, so the edit UI always reflects the server.
    function findStripItem(d, entity, id) {
      var items = d["strip_" + entity] || [];
      for (var i = 0; i < items.length; i++) {
        if (String(items[i].id) === String(id)) return items[i];
      }
      return null;
    }

    // Feed-amount step buttons for one side of the commit: a coarse 35 and a
    // fine 5 (in outer→inner order), so a bottle-sized jump is one tap and any
    // multiple of 5 is a couple more — the quick-stepper the tape redesign
    // wants, but no longer stuck on 10-ml increments.
    function feedStepBtns(side, dis) {
      var steps = side === "lo"
        ? [["-35", "&minus;35"], ["-5", "&minus;5"]]
        : [["5", "+5"], ["35", "+35"]];
      var s = "";
      for (var i = 0; i < steps.length; i++) {
        s += '<button type="button" class="strip-btn strip-step" data-strip="amt" data-d="' +
          steps[i][0] + '"' + dis + '>' + steps[i][1] + '</button>';
      }
      return s;
    }

    function stripActionsHtml(d) {
      var dis = stripBusy ? " disabled" : "";
      var cancel = '<button type="button" class="strip-btn strip-cancel" data-strip="cancel"' + dis + '>' +
        '<span class="strip-x">&times;</span>' + escapeHtml(i18n("Cancel")) + '</button>';
      var out = '<div class="strip-actions">';
      // Edit mode, armed by tapping a list row (which also parks the marker
      // on the record and anchors the snap grid to its exact timestamp — see
      // stripMarkerMin): the same controls the domain's quick-add uses, and
      // a Delete | Cancel subrow. A commit writes the value shown — plus the
      // marker's time, but only when the user has actually scrubbed the tape
      // since arming (stripEditMoved), so an untouched tape never re-times
      // the record and a scrubbed one moves it in clean ±10 min steps with
      // its seconds preserved. Tapping the current choice after a scrub is
      // therefore a pure re-time. However the edit ends, the marker returns
      // to its pre-edit berth.
      var edItem = stripEdit && findStripItem(d, stripEdit.entity, stripEdit.id);
      if (stripEdit && !edItem) { // deleted elsewhere: disarm
        stripEdit = null;
        stripDelPending = false;
        stripEditRestore();
      }
      if (edItem) {
        var edCls = stripEdit.entity === "feedings" ? "s-feeding"
          : stripEdit.entity === "diapers" ? "s-diaper" : "s-routine";
        if (stripEdit.entity === "feedings") {
          out += feedStepBtns("lo", dis) +
            '<button type="button" class="strip-btn strip-commit s-feeding" data-strip="save"' + dis + '>' +
              '<span class="strip-plus">&check;</span>' + stripAmt + ' ml</button>' +
            feedStepBtns("hi", dis);
        } else {
          var cur = stripEdit.entity === "diapers" ? edItem.kind : edItem.name;
          var echs = STRIP_CHOICES[stripEdit.entity];
          // A routine logged via Alexa/MCP can carry a name outside the curated
          // quick-add set (e.g. "Walk", a medicine). Surface the record's own
          // value as the selected choice so tapping it re-times the entry —
          // otherwise the only commit is a curated label and the edit would
          // silently rename it. (Diaper kinds are always in the set.)
          var haveCur = false;
          for (var hc = 0; hc < echs.length; hc++) if (echs[hc][0] === cur) { haveCur = true; break; }
          if (!haveCur) echs = [[cur, cur]].concat(echs);
          for (var eb = 0; eb < echs.length; eb++) {
            out += '<button type="button" class="strip-btn strip-commit ' + edCls +
              (echs[eb][0] === cur ? " strip-cur" : "") + '" data-strip="choice" data-value="' +
              escapeHtml(echs[eb][0]) + '"' + dis + '>' + escapeHtml(i18n(echs[eb][1])) + '</button>';
          }
        }
        out += '<div class="strip-subrow ' + edCls + '">' +
          '<button type="button" class="strip-btn strip-del' + (stripDelPending ? " pending" : "") +
            '" data-strip="del"' + dis + '>' + escapeHtml(i18n(stripDelPending ? "Confirm?" : "Delete")) + '</button>' +
          cancel + '</div>';
        return out + '</div>';
      }
      if (stripChoice === "feedings") {
        out += feedStepBtns("lo", dis) +
          '<button type="button" class="strip-btn strip-commit s-feeding" data-strip="feed"' + dis + '>' +
            '<span class="strip-plus">+</span>' + stripAmt + ' ml</button>' +
          feedStepBtns("hi", dis) +
          cancel;
      } else if (stripChoice) {
        var cls = stripChoice === "diapers" ? "s-diaper" : "s-routine";
        var chs = STRIP_CHOICES[stripChoice];
        for (var i = 0; i < chs.length; i++) {
          out += '<button type="button" class="strip-btn strip-commit ' + cls + '" data-strip="choice" data-value="' +
            escapeHtml(chs[i][0]) + '"' + dis + '>' + escapeHtml(i18n(chs[i][1])) + '</button>';
        }
        out += cancel;
      } else {
        out += '<button type="button" class="strip-btn s-feeding" data-strip="pick" data-entity="feedings"' + dis + '>' +
            '<span class="strip-plus">+</span>' + escapeHtml(i18n("Feeding")) + '</button>' +
          '<button type="button" class="strip-btn s-diaper" data-strip="pick" data-entity="diapers"' + dis + '>' +
            '<span class="strip-plus">+</span>' + escapeHtml(i18n("Diaper")) + '</button>' +
          '<button type="button" class="strip-btn s-routine" data-strip="pick" data-entity="routines"' + dis + '>' +
            '<span class="strip-plus">+</span>' + escapeHtml(i18n("Routine")) + '</button>';
      }
      return out + '</div>';
    }

    function updateStripActions() {
      var el = document.querySelector("#today-strip .strip-actions");
      if (el && dashboardData) el.outerHTML = stripActionsHtml(dashboardData);
    }

    // Today's checks — the active indications the server evaluated over the
    // Madrid day (each rule's own period_days window ending today; see the
    // .strip-targets CSS for the state coloring and why the marker never
    // touches these). Open rules lead, satisfied ones retire to the tail —
    // what still needs doing is always in view without scrolling; within a
    // state, domain order (feeding, diapers, routines, the tape lanes'
    // order) keeps ties predictable. A chip is just name + score; the
    // units, window and formula basis behind the numbers live in a tap
    // caption (stripTipText) so the ribbon stays scannable.
    var TGT_DOMAIN = {
      feeding_total_ml: 0, feeding_count: 0, feeding_gap_max_min: 0,
      diaper_count: 1, routine_count: 2
    };
    var TGT_CLS = ["s-feeding", "s-diaper", "s-routine", ""];
    function stripTargetsHtml(d) {
      var inds = (d.indications || []).slice();
      if (!inds.length) return "";
      function dom(ind) { return ind.metric in TGT_DOMAIN ? TGT_DOMAIN[ind.metric] : 3; }
      inds.sort(function(a, b) { return (a.met - b.met) || (dom(a) - dom(b)); });
      var out = '<div class="strip-targets">';
      for (var i = 0; i < inds.length; i++) {
        var ind = inds[i];
        var over = !ind.met && ind.comparison === "<=";
        // VS15 keeps the warning sign a text glyph, not an emoji — same
        // trick as the header's gear. An open rule carries no glyph: the
        // muted ghost is the state.
        var mark = ind.met ? "&#10003;" : over ? "&#9888;&#65038;" : "";
        // Routine-name translations are lowercased for the log rows; as a
        // standalone label the chip capitalizes ("vitamina D" → "Vitamina D").
        var name = i18n(ind.label);
        name = name.charAt(0).toUpperCase() + name.slice(1);
        out += '<button type="button" class="strip-chip ' + TGT_CLS[dom(ind)] +
          (ind.met ? " met" : over ? " over" : "") +
          '" data-tip="' + escapeHtml(stripTipText(ind)) + '">' +
          (mark ? '<span class="strip-chip-mark">' + mark + '</span>' : "") +
          escapeHtml(name) +
          '<span class="strip-chip-n">' + escapeHtml(ind.actual + "/" + ind.target) + '</span>' +
        '</button>';
      }
      return out + "</div>";
    }

    // The tapped chip's rule, spelled out from the indication's structured
    // columns (direction, target, unit, window, formula) — never from the
    // label — so custom targets this code has never seen read correctly too.
    function stripTipText(ind) {
      var n = ind.target + (ind.unit ? " " + ind.unit : "");
      var txt;
      if (ind.metric === "feeding_gap_max_min") {
        // The gap target is minutes in the DB; a multi-hour cap reads as
        // "5h", not "300 min" (the chip face keeps the raw minute score).
        txt = i18n("At most {n} between feeds", { n: durationLabel(ind.target * 60000) });
      } else if (ind.period_days > 1) {
        txt = i18n(ind.comparison === "<=" ? "At most {n} every {d} days" : "At least {n} every {d} days",
          { n: n, d: ind.period_days });
      } else {
        txt = i18n(ind.comparison === "<=" ? "At most {n} a day" : "At least {n} a day", { n: n });
      }
      if (ind.formula) {
        txt += " — " + i18n(ind.formula === "milk_ml_per_kg_day"
          ? "150 ml per kg of body weight" : "adjusts with age");
      }
      return txt;
    }

    // One shared caption serves every tap-to-reveal — target chips AND the
    // feeding gauge's marks — so they can't drift into two dialects. It
    // lives on <body> as a fixed box (the ribbon's scroller + mask and the
    // gauge row would clip anything inside), so any scroll — page, ribbon
    // or tape — dismisses it rather than letting it drift from its anchor;
    // so does tapping anywhere else, or the anchor again. Placement clamps
    // to the viewport on both axes: the box slides along its anchor's edge
    // horizontally and flips over the anchor when its preferred side runs
    // out of screen, so no part of it can ever land off screen.
    var tapTipEl = null;
    function hideTapTip() {
      if (tapTipEl) { tapTipEl.remove(); tapTipEl = null; }
    }
    function showTapTip(forEl, rect, cx, above, val, meta) {
      hideTapTip(); // only ever one caption on the page
      var tip = document.createElement("div");

    // The log is the tab's last block, so it grows to whatever the viewport
    // leaves under the quick-add row — measured against the list's own top

    // that short screens don't scroll. 44 = the .strip-row pitch.

      // rides along beyond it (rows reach there once the tape is
      // jump-extended, or when the marker parks at the base tape's start).
      var wd = weekdayLabel(new Date(ds + "T00:00:00Z"));

    // both a scrub-speed win and what lets a slide finish instead of being
    // torn down by the very scroll that started it.
    var stripPrevRows = [];    // last rendered browse rows: { key, html }

    var stripListLast = null;  // last html handed to the list (no-op detector)

      stripSlide(el, roll, prev, cur);
    }

    // Was the row window merely slid k notches along the log? +k: the marker
    // moved into the past and the column shifts up; −k: toward now, shifts

    // those snap. Keys are entity:id, so relabels don't read as motion.
    function stripShift(prev, cur) {

    // One notch of paper-feed. The final DOM is in place before any motion —
    // transforms move hit targets with the pixels, so a tap mid-slide lands
    // on what it visually hits. The rows that left ride along as inert
    // ghosts while the column slides one row pitch into its resting box,

    // FG_WINDOW_DAYS = how many prior days define the "usual" range that the

    // span Tᵢ = κᵢ·FG_TRUNC, where the raw curve has decayed to FG_EPS.

    function fgKappa(amountMl, medMl, k0) {

    }
    // This feed's truncation span Tᵢ (where the raw curve reaches FG_EPS).

      ev.sort(function(a, b) { return a.t - b.t; });

      // contribute exactly 0, so the backward walk stops there.

        all.push(f);

        // The ring's scale is the p90 of those maxima, NOT the max — one
        // typo'd mega-feed must not compress every future arc (frac clamps
        // at 1, so the genuinely-fuller top decile simply reads full).
        peaks.push(f + ev[i].a);

      all.sort(function(a, b) { return a - b; });
      day.sort(function(a, b) { return a - b; });
      night.sort(function(a, b) { return a - b; });
      peaks.sort(function(a, b) { return a - b; });
      var peak = fgQuantile(peaks, 0.9);
      // Volumeless history (no ml logged on ~any feed): the p90 of maxima is 0,
      // so the ring's 0→peak scale would divide by zero (NaN arc/tick). The
      // gauge is volume-based and can't render without volume — gate off like
      // young history rather than hand the renderer a 0 scale.
      if (!(peak > 0)) return null;

    }

    // ---- Self-calibrated emptying speed (see the realistic belly-ring design in docs/) ----
    // t½ is a per-baby unknown (breastmilk vs formula alone is ~2×). The
