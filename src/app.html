    // the current fullness and the pre-feed references — but the countdown's
    // *slope* does not. So pick the half-life whose own next-feed forecast
    // best matches when she actually got fed. The grid is ordered prior-first
    // (by distance from the 60-min anchor) with strict improvement required,
    // so a candidate only unseats 60 min by strictly out-forecasting it.
    // Memoized on the feeds array identity like medFeedMl; sparse history
    // (under the meter's own 20-sample gate) keeps the anchor.
    // Measured behavior (backtested against synthetic babies): recovers the
    // true t½ well on realistic on-demand data, where she is fed at a
    // consistent positive fullness so every candidate's pre-feed reference is
    // > 0. Two known limitations, both benign and prior-leaning: (1) the
    // objective is bimodal — a candidate whose span is shorter than her
    // median feed gap reads ~0 pre-feed fullness, so its reference rounds to
    // 0, no forecast can cross it, and it scores the 12h miss-bound; the pick
    // is thus effectively the shortest t½ whose span clears her typical gap,
    // then split on forecast quality. So with real gap jitter the 60-min
    // prior CAN be nudged (e.g. to 75) when its own span no longer clears the
    // gap — it is not strictly pinned for equal-size schedules. (2) frequent
    // feeding biases the pick toward the shorter/safer anchor. Both move
    // toward the conservative side and only touch the countdown slope, never
    // fullness itself (fullnessAt/digSumMl self-calibrate to the same k0, so
    // conservation still holds exactly). Sharpening the objective past the
    // ref≈0 cliff is deferred — see the hardening plan's review notes.
    var FG_T_HALF_GRID = [60, 45, 75, 30, 90, 105, 120]; // minutes, prior-first
    var fgK0For = null, fgK0Ms = FG_KAPPA0_MS;
    function calibKappa0(feeds) {
      if (feeds === fgK0For) return fgK0Ms;
      fgK0For = feeds;
      fgK0Ms = FG_KAPPA0_MS;
      var m = medFeedMl(feeds), ev = [], i;
      for (i = 0; i < feeds.length; i++)
        ev.push({ t: new Date(feeds[i].ts).getTime(), a: feeds[i].amount_ml || 0 });
      ev.sort(function(a, b) { return a.t - b.t; });
      if (ev.length < FG_HGR_MIN_N) return fgK0Ms;
      var bestErr = Infinity;
      for (i = 0; i < FG_T_HALF_GRID.length; i++) {
        var k0 = FG_T_HALF_GRID[i] * 60000 / Math.pow(Math.LN2, 1 / FG_BETA);
        var err = fgForecastErr(ev, m, k0);
        if (err != null && err < bestErr) { bestErr = err; fgK0Ms = k0; }
      }
      return fgK0Ms;
    }

    // Median |forecast − actual| (ms) for the candidate kernel: derive the
    // candidate's own pre-feed reference levels, then after each feed
    // forecast the reference crossing (5-min steps, 12h bound — a miss
    // scores the bound, so a kernel that never predicts is penalized, not
    // skipped) and compare against the next real feed. One grid evaluation
    // is O(n·(span + 144·span)) — ms-scale for a loaded strip, and the
    // whole grid runs once per payload thanks to the memo above.
    function fgForecastErr(ev, m, k0) {
      var pre = [], day = [], night = [], i, j, t, f;
      var maxA = 0;
      for (i = 0; i < ev.length; i++) if (ev[i].a > maxA) maxA = ev[i].a;
      var span = fgKappa(maxA, m, k0) * FG_TRUNC;
      for (i = 0; i < ev.length; i++) {
        f = 0;
        for (j = i - 1; j >= 0 && ev[i].t - ev[j].t < span; j--)
          f += ev[j].a * remFrac(ev[i].t - ev[j].t, ev[j].a, m, k0);
        pre.push(f);
        (nightAt(ev[i].t) ? night : day).push(f);
      }
      var all = pre.slice().sort(function(a, b) { return a - b; });
      day.sort(function(a, b) { return a - b; });
      night.sort(function(a, b) { return a - b; });
      var med = fgQuantile(all, 0.5);
      var refDay = day.length >= FG_HGR_MIN_CLASS ? fgQuantile(day, 0.5) : med;
      var refNight = night.length >= FG_HGR_MIN_CLASS ? fgQuantile(night, 0.5) : med;
      var errs = [];
      for (i = 0; i < ev.length - 1; i++) {
        var cross = null;
        for (var k = 0; k <= 144; k++) { // 12h in 5-min steps
          t = ev[i].t + k * 300000;
          f = 0;
          for (j = i; j >= 0 && t - ev[j].t < span; j--)
            f += ev[j].a * remFrac(t - ev[j].t, ev[j].a, m, k0);
          if (f < (nightAt(t) ? refNight : refDay)) { cross = t; break; }
        }
        errs.push(Math.abs((cross == null ? ev[i].t + 144 * 300000 : cross) - ev[i + 1].t));
      }
      if (!errs.length) return null;
      errs.sort(function(a, b) { return a - b; });
      return fgQuantile(errs, 0.5);
    }


    // Selected baby's birth instant (ms), or null when unknown — lets a window
    // that lies entirely before the baby existed blank out instead of reading a
    // misleading zero.
    function selectedBornMs(d) {
      var b = d.babies || [], i;
      for (i = 0; i < b.length; i++) {
        if (String(b[i].id) === String(d.baby_id) && b[i].date_of_birth)
          return new Date(b[i].date_of_birth + "T00:00:00Z").getTime();
      }
      return null;
    }

    // Feed ml/count and pee/poop over (startMs, endMs] — half-open at the start
    // so an event on a shared boundary lands in exactly one window.
    function sumRange(d, startMs, endMs) {
      var s = { ml: 0, feeds: 0, pee: 0, poop: 0 }, i, t;
      var f = d.strip_feedings || [];
      for (i = 0; i < f.length; i++) {
        t = new Date(f[i].ts).getTime();
        if (t > startMs && t <= endMs) { s.ml += f[i].amount_ml || 0; s.feeds++; }
      }
      var dp = d.strip_diapers || [];
      for (i = 0; i < dp.length; i++) {
        t = new Date(dp[i].ts).getTime();
        if (t > startMs && t <= endMs) {
          var k = dp[i].kind;
          if (k === "pee") s.pee++;
          else if (k === "poop") s.poop++;
        }
      }
      return s;
    }

    // The 24h ending at endMs. Null when the window predates birth entirely.
    function windowStats(d, endMs, bornMs) {
      if (bornMs != null && endMs <= bornMs) return null;
      return sumRange(d, endMs - DAY_MS, endMs);
    }

    // The largest rolling 24h intake anywhere in the loaded feed history — the
    // stable ceiling for the rail's scale. The max window can always be taken to
    // end on a feed event, so a two-pointer sweep over the events finds it.
    function fgMaxDaily(feeds) {
      var ev = [], i;
      for (i = 0; i < feeds.length; i++)
        ev.push({ t: new Date(feeds[i].ts).getTime(), a: feeds[i].amount_ml || 0 });
      ev.sort(function (a, b) { return a.t - b.t; });
      var max = 0, sum = 0, l = 0, r;
      for (r = 0; r < ev.length; r++) {
        sum += ev[r].a;
        while (ev[l].t <= ev[r].t - DAY_MS) { sum -= ev[l].a; l++; }
        if (sum > max) max = sum;
      }
      return max;
    }

    // The lowest rolling 24h intake across the last FG_WINDOW_DAYS windows
    // ending at nowMs — the pinned floor for the rail's scale. Anchored to the
    // clock, not the marker, so scrubbing never resizes the axis. Windows that
    // predate tracking (or a gap day) sum to zero and pull the floor to 0,
    // which keeps young or spotty histories on the full 0-based rail.
    function fgMinDaily(feeds, nowMs) {
      var min = Infinity, j, i, t, end, sum;
      for (j = 0; j < FG_WINDOW_DAYS; j++) {
        end = nowMs - j * DAY_MS;
        sum = 0;
        for (i = 0; i < feeds.length; i++) {
          t = new Date(feeds[i].ts).getTime();
          if (t > end - DAY_MS && t <= end) sum += feeds[i].amount_ml || 0;
        }
        if (sum < min) min = sum;
      }
      return min === Infinity ? 0 : min;
    }

    // One tappable mark: carries its own value (data-v, shown on tap), its
    // rail position (data-x, where the tap caption anchors), and optionally
    // the time window behind the number (data-m, the caption's quieter
    // suffix — worded relative to the marker, since scrubbing moves the
    // whole window).
    function fgMark(cls, xPct, val, inner, meta) {
      return '<div class="' + cls + '" data-x="' + xPct.toFixed(1) +
        '" data-v="' + escapeHtml(val) +
        (meta ? '" data-m="' + escapeHtml(meta) : '') +
        '" style="left:' + xPct.toFixed(1) + '%">' +
        (inner || '') + '</div>';
    }

    function stripCompareHtml(d) {
      var endMs = markerInstant().getTime();
      var born = selectedBornMs(d);
      var w0 = windowStats(d, endMs, born);           // the last 24h

      // Marker window entirely before birth: nothing honest to show yet.
      if (w0 == null)
        return '<div class="fg-empty">' + escapeHtml(i18n("No feeds in this window yet.")) + '</div>';

      var feeds = d.strip_feedings || [];
      // Digested ml, not raw sums; captions carry ≈ because the numbers are
      // modeled, not logged totals.
      var today = digSumMl(feeds, endMs - DAY_MS, endMs);

      // The "usual" range = the distribution of the prior FG_WINDOW_DAYS daily
      // totals, today excluded so it can't bias its own band. Floor the sample
      // at the first feeding record: days before tracking began would read as
      // false zeros and drag the range down. (Birth is implied — you can't feed
      // before it — so this floor supersedes the born cutoff.)
      var firstFeedMs = null, fi, ft;
      for (fi = 0; fi < feeds.length; fi++) {
        ft = new Date(feeds[fi].ts).getTime();
        if (firstFeedMs == null || ft < firstFeedMs) firstFeedMs = ft;
      }
      var statFloor = firstFeedMs == null ? born
        : born == null ? firstFeedMs : Math.max(born, firstFeedMs);

      // priorDays keeps each total paired with how many days before the
      // marker it fell — the early ticks reveal that on tap; priors is the
      // same list sorted for the quantiles.
      var priors = [], priorDays = [], j, ws;
      for (j = 1; j <= FG_WINDOW_DAYS; j++) {
        ws = windowStats(d, endMs - j * DAY_MS, statFloor);
        if (ws != null) {
          var pml = digSumMl(feeds, endMs - (j + 1) * DAY_MS, endMs - j * DAY_MS);
          priors.push(pml); priorDays.push({ ml: pml, j: j });
        }
      }
      priors.sort(function (a, b) { return a - b; });
      // The window behind every aggregate mark, revealed with its value.
      var winMeta = plural(priors.length, "{n} day before this moment", "{n} days before this moment");

      // Absolute scale — the rail is a daily-intake gauge. Its two ends are the
      // only printed numbers; every mark's exact value is a tap away. The top is
      // the largest 24h intake anywhere in the loaded history (rounded up past
      // it), so the scale holds still while you scrub instead of resizing. The
      // bottom trims the dead left of the rail — intake grows with the baby, so
      // an always-0 axis ends up mostly empty — but only when the trim frees at
      // least a quarter of the rail; marks are positions, not bars, so a nonzero
      // floor stays honest. Anything below the floor clamps to the rail's end
      // (its tap value is still exact).
      var axMax = (Math.floor(fgMaxDaily(feeds) / 50) + 1) * 50;
      var axMin = Math.floor(fgMinDaily(feeds, Date.now()) / 50) * 50;
      if (axMin < axMax * 0.25) axMin = 0;
      var pos = function (v) {
        return Math.max(0, Math.min(100, (v - axMin) / (axMax - axMin) * 100));
      };
      var mi;
      var fgEnd = function (v) {
        return '<span class="fg-end">' + v + '<span class="fg-end-u">ml</span></span>';
      };
      var endLo = fgEnd(axMin), endHi = fgEnd(axMax);
      var needle = fgMark("fg-today", pos(today), i18n("day total {n} ml", { n: "≈ " + fgMl(today) }),
        '<span class="fg-today-cap"></span>', i18n("24h before this moment"));
      // Too little history for an honest range yet — so this is the rail before
      // it can draw a band: the days on record are muted ticks (each tappable
      // for its total and which day it was), today the feed-hue needle. The
      // band fills in later.
      if (priors.length < FG_MIN_DAYS) {
        var ticks = '';
        for (mi = 0; mi < priorDays.length; mi++)
          ticks += fgMark("fg-tick", pos(priorDays[mi].ml), "≈ " + fgMl(priorDays[mi].ml) + " ml", '',
            plural(priorDays[mi].j, "{n} day before this moment", "{n} days before this moment"));
        return '<div class="fg-gauge">' + endLo +
          '<div class="fg-bullet">' +
            '<div class="fg-rail"></div>' + ticks + needle +
          '</div>' + endHi +
        '</div>';
      }

      var q1 = fgQuantile(priors, 0.25), med = fgQuantile(priors, 0.5), q3 = fgQuantile(priors, 0.75);
      var bl = pos(q1), br = pos(q3);
      // A horizontal box plot: whiskers span the window's lowest→highest day,
      // the band is the q1–q3 box, the median ticks inside it, and today's
      // needle reads against all of it. Every mark holds its number for a tap;
      // nothing is printed but the scale's ends.
      var band = '<div class="fg-band" data-x="' + ((bl + br) / 2).toFixed(1) +
        '" data-v="' + escapeHtml(i18n("usual") + " ≈ " + fgMl(q1) + "–" + fgMl(q3) + " ml") +
        '" data-m="' + escapeHtml(winMeta) +
        '" style="left:' + bl.toFixed(1) + '%;width:' + (br - bl).toFixed(1) + '%"></div>';
      // Statistically the median, but the caption says "typical day" — the
      // one stats word on the page didn't survive the elder-audience test.
      var median = fgMark("fg-med", pos(med), i18n("typical day") + " ≈ " + fgMl(med) + " ml", '', winMeta);
      var wLo = pos(priors[0]), wHi = pos(priors[priors.length - 1]);
      var whisks =
        '<div class="fg-whisk lo" data-x="' + wLo.toFixed(1) +
          '" data-v="' + escapeHtml(i18n("lowest day") + " ≈ " + fgMl(priors[0]) + " ml") +
          '" data-m="' + escapeHtml(winMeta) +
          '" style="left:' + wLo.toFixed(1) + '%;width:' + Math.max(0, bl - wLo).toFixed(1) + '%">' +
          '<span class="fg-whisk-cap"></span></div>' +
        '<div class="fg-whisk hi" data-x="' + wHi.toFixed(1) +
          '" data-v="' + escapeHtml(i18n("highest day") + " ≈ " + fgMl(priors[priors.length - 1]) + " ml") +
          '" data-m="' + escapeHtml(winMeta) +
          '" style="left:' + br.toFixed(1) + '%;width:' + Math.max(0, wHi - br).toFixed(1) + '%">' +
          '<span class="fg-whisk-cap"></span></div>';
      return '<div class="fg-gauge">' + endLo +
        '<div class="fg-bullet">' +
          '<div class="fg-rail"></div>' + whisks + band + median + needle +
        '</div>' + endHi +
      '</div>';
    }

    // Hunger references are payload-derived; memoized on the feeds array's
    // identity so scroll ticks never re-run the calibration.
    var fgHungerFor = null, fgHungerRefs = null;
    function hungerRefs(d) {
      var feeds = d.strip_feedings || [];
      if (feeds !== fgHungerFor) { fgHungerFor = feeds; fgHungerRefs = hungerCalib(feeds); }
      return fgHungerRefs;
    }

    // ---- The corner belly ring (see the realistic belly-ring design in docs/) ----
    // The hunger meter's face: a radial fullness gauge in the corner cluster's
    // reserved 48px slot (right of the door). The feed-hue arc sweeps clockwise
    // from 12 o'clock, its length = fullness at the marker on her own 0→peak
    // scale; a muted tick marks the usually-fed reference for the marker's
    // day/night class. The centre carries a terse magnitude-adaptive countdown
    // to the next feed when the marker reads now, else the belly ml. Hungry
    // (fullness under the reference) swaps the arc and token from feed-hue to
    // danger. Precise clock-time + the calibration why-line live in the tap.
    var BR_SZ = 48, BR_C = 24, BR_R = 20; // ring box / centre / radius (px)
    var BR_TICK = 3.5;                    // reserve tick half-length across the ring
    var BR_FLOOR = 0.035;                 // min swept fraction so non-empty ≠ empty

    // First instant from nowMs (1-minute steps, up to +12h) where the draining
    // fullness crosses under its own class reference — the tank's forecast, now
    // feeding both the centre countdown and the tap. Each step re-classes
    // day/night so the night boundary is respected. Returns nowMs when already
    // hungry, null when nothing lands in 12h.
    function hungerCrossMs(feeds, refs, nowMs) {
      for (var k = 0; k <= 720; k++) {
        var t = nowMs + k * 60000;
        if (fullnessAt(feeds, t) < (nightAt(t) ? refs.night : refs.day)) return t;
      }
      return null;
    }

    // The mirror question once already hungry: when DID she cross under the
    // reference? Walk back minute-by-minute (12h bound) to the most recent
    // instant at or above the then-current class reference; the crossing is
    // one step after it. Null when the whole window reads hungry —
    // calibration noise; better no claim than a wrong one.
    function hungerCrossPastMs(feeds, refs, nowMs) {
      for (var k = 1; k <= 720; k++) {
        var t = nowMs - k * 60000;
        if (fullnessAt(feeds, t) >= (nightAt(t) ? refs.night : refs.day)) return t + 60000;
      }
      return null;
    }

    // The centre token: a terse, magnitude-adaptive countdown to the next feed
    // (a bare number with a small feed-hue unit — m / h / ½h — mirroring the ml
    // token's number+unit shape; the feed hue is what tells the two apart at a
    // glance) when the marker reads now and a crossing lands within 12h; else
    // the belly ml (a tiny muted ml unit). 'soon'/'now' cover the short end.
    // "Marker at now" is the readout's own test (markerMin ≥ nowMin) — NOT
    // stripFollowNow (see bellyTankTip). Always returns something.
    function bellyCountdownToken(feeds, refs, ml) {
      if (stripMarkerMin() >= rsNowMin()) {
        var cross = hungerCrossMs(feeds, refs, Date.now());
        if (cross != null) {
          if (cross <= Date.now()) return i18n("now");
          var mins = (cross - Date.now()) / 60000;
          if (mins < 15) return i18n("soon");
          if (mins < 60) {
            var m5 = Math.round(mins / 5) * 5;
            if (m5 < 60) return m5 + '<i class="br-unit">m</i>';
            // rounded up to the hour → fall through to the hour format
          }
          var halves = Math.round(mins / 30), h = Math.floor(halves / 2);
          return h + '<i class="br-unit">' + (halves % 2 ? "½h" : "h") + '</i>';
        }
      }
      return fgMl(ml) + '<i class="br-ml">ml</i>';
    }

    var bellyTankLast = null; // last rendered-state signature (no-op detector)
    function updateBellyTank() {
      var el = document.getElementById("belly-tank");
      if (!el) return;
      var refs = dashboardData && hungerRefs(dashboardData);
      var endMs = markerInstant().getTime();
      // Gated off (young history / marker before tracking): door alone.
      if (!refs || endMs < refs.firstMs) {
        el.hidden = true;
        bellyTankLast = null;
        if (tapTipEl && tapTipEl.tipFor === el) hideTapTip();
        return;
      }
      var feeds = dashboardData.strip_feedings || [];
      var f = fullnessAt(feeds, endMs);
      var ref = nightAt(endMs) ? refs.night : refs.day;
      // Arc length = fullness on the 0→peak scale, with a sliver floor so a
      // non-empty belly never reads fully empty; the reserve tick sits on the
      // same scale. Both clamp to a full sweep at the fringe past peak.
      var frac = Math.max(0, Math.min(1, f / refs.peak));
      if (f > 0 && frac < BR_FLOOR) frac = BR_FLOOR;
      var refFrac = Math.max(0, Math.min(1, ref / refs.peak));
      var circ = 2 * Math.PI * BR_R;
      var token = bellyCountdownToken(feeds, refs, f);
      el.classList.toggle("hungry", f < ref);
      el.hidden = false;
      // The svg is built once and then patched in place — node identity is
      // what lets the arc's CSS transition run (an innerHTML rebuild remakes
      // the nodes and jumps). The signature spares quiet ticks a patch; a
      // changed one invalidates an open caption (its estimate went stale).
      var sig = frac.toFixed(4) + "|" + refFrac.toFixed(4) + "|" + token + "|" + (f < ref) + "|" + fgMl(f);
      if (sig === bellyTankLast && el.firstChild) return;
      bellyTankLast = sig;
      if (tapTipEl && tapTipEl.tipFor === el) hideTapTip();
      if (!el.firstChild) {
        el.innerHTML = '<span class="br-wrap">' +
          '<svg class="br-svg" width="' + BR_SZ + '" height="' + BR_SZ + '" viewBox="0 0 ' + BR_SZ + ' ' + BR_SZ + '" aria-hidden="true">' +
            '<circle class="br-track" cx="' + BR_C + '" cy="' + BR_C + '" r="' + BR_R + '"/>' +
            '<circle class="br-fill" cx="' + BR_C + '" cy="' + BR_C + '" r="' + BR_R +
              '" transform="rotate(-90 ' + BR_C + ' ' + BR_C + ')"/>' +
            '<line class="br-tick" x1="' + BR_C + '" y1="' + (BR_C - (BR_R - BR_TICK)) +
              '" x2="' + BR_C + '" y2="' + (BR_C - (BR_R + BR_TICK)) + '"/>' +
          '</svg>' +
          '<span class="br-token"></span></span>';
      }
      el.querySelector(".br-fill").setAttribute("stroke-dasharray",
        (circ * frac).toFixed(2) + " " + circ.toFixed(2));
      // Reserve tick: the shell's fixed 12-o'clock segment (just inside→outside
      // the ring) rotated to the reference angle (clockwise); patching only the
      // transform lets it ease to a new usually-fed level instead of snapping.
      el.querySelector(".br-tick").setAttribute("transform",
        "rotate(" + (refFrac * 360).toFixed(2) + " " + BR_C + " " + BR_C + ")");
      el.querySelector(".br-token").innerHTML = token;
      // The svg is decorative (aria-hidden); the div itself tells assistive
      // tech the story — belly ml, plus the countdown when one is showing,
      // tag-stripped ("40m", not the <i>-wrapped unit markup). The ml-fallback
      // token is skipped — it would just repeat the label.
      var label = i18n("belly ≈ {n} ml", { n: fgMl(f) });
      if (token.indexOf("br-ml") < 0) label += " · " + token.replace(/<[^>]*>/g, "");
      el.setAttribute("aria-label", label);
    }

    // Tap caption, built at tap time: the belly ml leads, the next-feed
    // estimate rides along when the marker sits at now (the past needs
    // no forecast), and the calibration story is the meta line. "At now"
    // is the readout's own test (markerMin == nowMin, 5-min slack) — NOT
    // stripFollowNow: the strict glue flag drifts false on idle float
    // dust while the dial still reads "Now", and a tap that shows no
    // forecast under a "Now" readout reads as broken.
    function bellyTankTip() {
      var refs = hungerRefs(dashboardData);
      var endMs = markerInstant().getTime();
      var feeds = dashboardData.strip_feedings || [];
      var v = i18n("belly ≈ {n} ml", { n: fgMl(fullnessAt(feeds, endMs)) });
      if (stripMarkerMin() >= rsNowMin()) {
        var cross = hungerCrossMs(feeds, refs, Date.now());
        if (cross != null) {
          if (cross <= Date.now()) {
            // Already under the reference: bare "now" goes stale (a long nap
            // can sit red for hours) — say when the crossing happened so the
            // parent can judge how overdue.
            var past = hungerCrossPastMs(feeds, refs, Date.now());
            v += " · " + (past != null
              ? i18n("usually fed by ~{t}", { t: formatTimeOfDay(new Date(past)) })
              : i18n("next feed ~ now"));
          } else {
            v += " · " + i18n("next feed ~{t}", { t: formatTimeOfDay(new Date(cross)) });
          }
        }
      }
      return {
        v: v,
        m: i18n("usually fed when ≈ {n} ml remain",
          { n: fgMl(nightAt(endMs) ? refs.night : refs.day) })
      };
    }

    var stripCompareLast = null; // last html handed to the gauge (no-op detector)
    function updateStripCompare() {
      var el = document.querySelector("#today-strip .strip-compare");
      if (!el || !dashboardData) return;
      // Unchanged html (a parked marker's tick) skips the rebuild outright,
      // so an open caption on a gauge mark rides quiet ticks out.
      var html = stripCompareHtml(dashboardData);
      if (html === stripCompareLast && el.firstChild) return;
      stripCompareLast = html;
      // Marks reveal their value via the shared tap caption (the document
      // click handler by .strip-targets). A real rebuild replaces the mark
      // a caption may be anchored to — drop it rather than let it float
      // free over stale innards; captions anchored outside the gauge (the
      // target chips) are safe and stay up.
      if (tapTipEl && el.contains(tapTipEl.tipFor)) hideTapTip();
      el.innerHTML = html;
    }

    // Refresh the readout from the scroll position: relative to now on the
    // big line ("2h 5m ago"), resolved on the small one ("Yesterday ·
    // 22:05" — clock time alone once the marker is inside today).
    function updateStripMarker() {
      var rel = document.querySelector("#today-strip .rs-readout-rel");
      if (!rel) return;
      var m = stripMarkerMin();
      // Rounded: on the edit-anchored grid m carries the record's seconds,
      // and the label must not read "1h 27.55m".
      rel.textContent = stripAgoLabel(Math.round(rsNowMin() - m));
      document.querySelector("#today-strip .rs-readout-abs").textContent = markerAbsLabel(" · ");
      updateStripCompare();
      updateStripList();
      updateBellyTank();
    }

    // Keep the marker inside the loggable day: the tape stops with 00:00 or
    // "now" under the head, so the future can never be picked. Re-assigning
    // scrollLeft here re-fires scroll once with an in-range value.
    function stripScrollClamp() {
      var sc = stripScroller();
      if (!sc || !sc.querySelector(".rhythm-strip")) return;
      // A scroll the code didn't set is the user scrubbing. While a record
      // is armed that arms the re-time: its commit will carry the marker's
      // time (2px of slack forgives re-render round-trip drift — well under
      // the marker's own 10-minute snap).
      if (stripEdit && !stripEditMoved && Math.abs(sc.scrollLeft - stripSetLeft) > 2) {
        stripEditMoved = true;
      }
      var lo = rsScrollFor(sc, 0);
      var hi = rsScrollFor(sc, rsNowMin());
      if (sc.scrollLeft < lo) stripSetScroll(sc, lo);
      else if (sc.scrollLeft > hi) stripSetScroll(sc, hi);
      stripFollowNow = sc.scrollLeft >= hi - 1;
      // Home again: the snap grid re-anchors on "now" (and the next render
      // may fold an extended tape back to the base days).
      if (stripFollowNow) stripJumpAnchorMin = null;
      updateStripMarker();
    }

    async function stripQuickAdd(entity, body) {
      if (stripBusy) return;
      stripBusy = true;
      updateStripActions(); // render the row disabled while the save runs
      body.when = markerInstant().toISOString();
      try {
        var created = await postJson(entities[entity].endpoint, body);
        savedToast(entity, body, created);
        loadDashboard();
      } catch (err) {
        toastErr(err);
      } finally {
        stripBusy = false;
        updateStripActions();
      }
    }

    // Shared plumbing for the armed record's commits (value save, re-time,
    // delete): busy state, toast, dashboard refresh — and on success the
    // marker sails home to its pre-edit berth.
    async function stripEditSend(run, doneMsg) {
      if (stripBusy || !stripEdit) return;
      stripBusy = true;
      stripDelPending = false;
      updateStripActions();
      updateStripList();
      var entity = stripEdit.entity, id = stripEdit.id;
      try {
        await run(entity, id);
        stripEdit = null;
        stripEditRestore();
        toast(i18n(doneMsg));
        loadDashboard();
      } catch (err) {
        toastErr(err);
      } finally {
        stripBusy = false;
        updateStripActions();
        updateStripList();
      }
    }

    // Arm a record's editor: park the marker on it and anchor the snap grid
    // to its exact minute (the readout names its moment, and any later scrub
    // steps the re-time in clean ±10 min from right here), then swap the
    // composer into that record's controls. Reached from a list-row tap or
    // from the record's mark on the tape — the latter can arrive while a
    // pick or another edit is open, so both are folded first; a hop between
    // records keeps the original berth, so however the session ends the
    // marker sails home to where it sat before the first arm.
    function stripArmEdit(entity, id) {
      if (stripBusy) return;
      var edIt = dashboardData && findStripItem(dashboardData, entity, id);
      if (!edIt) return;
      stripChoice = null;
      stripDelPending = false;
      if (!stripEdit) stripEditReturn = { followNow: stripFollowNow, min: stripMarkerMin() };
      stripEdit = { entity: entity, id: id };
      stripEditMoved = false; // a fresh arm starts with the time sacred
      if (entity === "feedings") stripAmt = edIt.amount_ml;
      stripEditAnchorMin = (toWall(new Date(edIt.ts)).getTime() - rsStartWallMs()) / 60000;
      stripScrollToMin(stripEditAnchorMin);
      updateStripActions();
      updateStripList();
    }

    var stripEl = document.getElementById("today-strip");
    // scroll doesn't bubble — capture catches the (re-created) scroller.
    stripEl.addEventListener("scroll", stripScrollClamp, true);

    // Mouse/pen drag the tape (touch pans via native scrolling).
    stripEl.addEventListener("pointerdown", function(e) {
      if (e.pointerType === "touch") return;
      var sc = e.target.closest && e.target.closest(".rhythm-scroll");
      if (!sc) return;
      e.preventDefault();
      stripStopMomentum(); // grabbing the tape kills an in-flight fling
      stripDragId = e.pointerId;
      stripDragX = e.clientX;
      stripDragLeft = sc.scrollLeft;
      stripDragMoved = false;
      stripVel = 0;
      stripLastX = e.clientX;
      stripVelT = e.timeStamp;
      try { sc.setPointerCapture(e.pointerId); } catch (_) {}
    });
    stripEl.addEventListener("pointermove", function(e) {
      if (stripDragId !== e.pointerId) return;
      var sc = stripScroller();
      if (!sc) return;
      var dx = e.clientX - stripDragX;
      if (Math.abs(dx) > 3) stripDragMoved = true;
      sc.scrollLeft = stripDragLeft - dx;
      var dt = e.timeStamp - stripVelT;
      if (dt > 0) {
        stripVel = 0.75 * ((e.clientX - stripLastX) / dt) + 0.25 * stripVel;
        stripLastX = e.clientX;
        stripVelT = e.timeStamp;
      }
    });
    function stripDragEnd(e) {
      if (stripDragId !== e.pointerId) return;
      stripDragId = null;
      // Fling only on a live release — a pause before letting go means stop.
      if (e.timeStamp - stripVelT < 80 && Math.abs(stripVel) > 0.25) {
        stripStartMomentum(-stripVel);
      }
    }
    stripEl.addEventListener("pointerup", stripDragEnd);
    stripEl.addEventListener("pointercancel", stripDragEnd);

    // Jump dialog wiring (the element is static; its innerHTML is rebuilt
    // per open, so everything is delegated). Commits on submit — the Go
    // button and the inputs' Enter both funnel here, with the native
    // required/min/max validation running first for free. Cancel, Esc
    // (the dialog's built-in cancel) and a backdrop tap all just close:
    // there is no state to unwind, the marker never moved.
    var jumpDlg = document.getElementById("jump-dialog");
    jumpDlg.addEventListener("submit", function(e) {
      e.preventDefault();
      stripJumpGo(e.target);
    });
    // Backdrop tap: the dialog element is the click target there too, but so
    // is its own padding — only a click outside the box's rect counts.
    function closeOnBackdrop(dlg, e) {
      if (e.target !== dlg) return;
      var r = dlg.getBoundingClientRect();
      if (e.clientX < r.left || e.clientX > r.right || e.clientY < r.top || e.clientY > r.bottom) {
        dlg.close();
      }
    }

    jumpDlg.addEventListener("click", function(e) {
      if (e.target.closest && e.target.closest('[data-jump="cancel"]')) {
        jumpDlg.close();
        return;
      }
      closeOnBackdrop(jumpDlg, e);
    });

    stripEl.addEventListener("click", function(e) {
      var t = e.target;
      var btn = t.closest ? t.closest("button[data-strip]") : null;
      if (btn) {
        var action = btn.getAttribute("data-strip");
        if (action === "jump-open") {
          stripJumpOpen();
        } else if (action === "feed") {
          stripChoice = null;
          updateStripActions();
          updateStripList();
          stripQuickAdd("feedings", { amount_ml: stripAmt });
        } else if (action === "amt") {
          stripAmt = Math.max(5, stripAmt + parseFloat(btn.getAttribute("data-d")));
          updateStripActions();
        } else if (action === "pick") {
          stripChoice = btn.getAttribute("data-entity");
          stripEdit = null;
          stripDelPending = false;
          stripEditRestore();
          if (stripChoice === "feedings") {
            var recent = (dashboardData && dashboardData.recent_feedings || [])[0];
            stripAmt = recent ? recent.amount_ml : 120;
          }
          updateStripActions();
          updateStripList();
        } else if (action === "choice") {
          var val = btn.getAttribute("data-value");
          if (stripEdit) {
            var chWhen = stripEditMoved ? markerInstant().toISOString() : null;
            stripEditSend(function(entity, id) {
              var chBody = entity === "diapers" ? { kind: val } : { name: val };
              if (chWhen) chBody.when = chWhen;
              return putJson(entities[entity].endpoint + "/" + encodeURIComponent(id), chBody);
            }, "Updated");
          } else {
            var entity = stripChoice;
            stripChoice = null;
            updateStripActions();
            updateStripList();
            stripQuickAdd(entity, entity === "diapers" ? { kind: val } : { name: val });
          }
        } else if (action === "row") {
          // Rows only render while nothing is armed and no pick is open (the
          // list hides for both), so a row tap always arms a fresh edit —
          // backing out is the editor's Cancel — and the berth is free.
          stripArmEdit(btn.getAttribute("data-entity"), btn.getAttribute("data-id"));
        } else if (action === "save") {
          var svWhen = stripEditMoved ? markerInstant().toISOString() : null;
          stripEditSend(function(entity, id) {
            var svBody = { amount_ml: stripAmt };
            if (svWhen) svBody.when = svWhen;
            return putJson(entities[entity].endpoint + "/" + encodeURIComponent(id), svBody);
          }, "Updated");
        } else if (action === "del") {
          if (!stripDelPending) {
            // Two-tap confirm, like the tab lists: arm, then auto-disarm.
            stripDelPending = true;
            updateStripActions();
            setTimeout(function() {
              if (stripDelPending && !stripBusy) {
                stripDelPending = false;
                updateStripActions();
              }
            }, 4000);
          } else {
            stripEditSend(function(entity, id) { return deleteEntry(entity, id); }, "Deleted");
          }
        } else if (action === "cancel") {
          stripChoice = null;
          stripEdit = null;
          stripDelPending = false;
          stripEditRestore();
          updateStripActions();
          updateStripList();
        }
        return;
      }
      // A tap on the tape scrolls that spot under the marker; a drag's end
      // click is swallowed via the moved flag. The needle's screen x is
      // read off its overlay so the inset lives only in the CSS.
      var sc = t.closest && t.closest(".rhythm-scroll");
      if (!sc) return;
      if (stripDragMoved) { stripDragMoved = false; return; }
      // A tap near a record's mark opens its editor instead: the nearest
      // mark center within a finger's reach wins. Distance is computed from
      // the marks themselves rather than hit-testing — the dots are far
      // smaller than a fingertip, paint order can't mis-target overlapping
      // neighbours, and mouse pointer capture (the drag grab above), which
      // retargets the click to the scroller, doesn't matter. Lanes sit
      // ~51px apart, so the 24px reach never bleeds into a neighbour lane.
      var marks = sc.querySelectorAll(".rs-dot, .rs-gauge, .rs-drop, .rs-rtn");
      var mark = null, markD = 24 * 24; // px², finger-sized reach
      for (var mi = 0; mi < marks.length; mi++) {
        var mr = marks[mi].getBoundingClientRect();
        var mdx = e.clientX - (mr.left + mr.width / 2);
        var mdy = e.clientY - (mr.top + mr.height / 2);
        if (mdx * mdx + mdy * mdy < markD) {
          markD = mdx * mdx + mdy * mdy;
          mark = marks[mi];
        }
      }
      if (mark) {
        stripArmEdit(mark.getAttribute("data-entity"), mark.getAttribute("data-id"));
        return;
      }
      var ov = document.querySelector("#today-strip .rs-marker-ov");
      sc.scrollBy({ left: e.clientX - ov.getBoundingClientRect().left, behavior: "smooth" });
    });

    // Estimate display: whole grams / one-decimal centimeters.
    function fmtEstG(v) { return typeof v === "number" ? fmtThousands(Math.round(v)) + " g" : ""; }
    function fmtEstCm(v) { return typeof v === "number" ? (Math.round(v * 10) / 10) + " cm" : ""; }

    // Two views, one door. Settings carries the record groups (weight /
    // height) plus the household groups, so opening it refreshes all three;
    // the corner button toggles between the views and restyles itself.
    function loadSettingsTab() {
      loadSettings();
      loadList("weights");
      loadList("heights");
    }

    function showTab(name) {
      currentTab = name;
      // Leaving the flyleaf resets it: every fold contracts (setFold also
      // lets go of any armed edit), so Settings reopens at rest — no
      // leftover workbench, no dim.
      if (name === "today") {
        var folds = document.querySelectorAll(".fold-tap");
        for (var f = 0; f < folds.length; f++) {
          var p = document.getElementById("panel-" + folds[f].getAttribute("data-entity"));
          if (p && !p.hidden) setFold(folds[f], false);
        }
      }
      var tabs = document.querySelectorAll(".tab");
      for (var j = 0; j < tabs.length; j++) {
        tabs[j].classList.toggle("active", tabs[j].id === "tab-" + name);
      }
      var btn = document.getElementById("settings-btn");
      if (btn) {
        var label = i18n(name === "settings" ? "Back to Today" : "Settings");
        btn.classList.toggle("at-settings", name === "settings");
        btn.setAttribute("aria-label", label);
        btn.setAttribute("title", label);
      }
      window.scrollTo(0, 0);
      if (name === "today") loadDashboard();
      else loadSettingsTab();
    }

    document.getElementById("settings-btn").addEventListener("click", function() {
      showTab(currentTab === "settings" ? "today" : "settings");
    });

    // Compact duration ("50 min", "3h 20m", "2 days") for the ago strings.
    function durationLabel(absMs) {
      var mins = Math.round(absMs / 60000);
      if (mins < 60) return mins + " min";
      var hrs = Math.floor(mins / 60);
      var rem = mins % 60;
      if (hrs < 24) return rem ? (hrs + "h " + rem + "m") : (hrs + "h");
      var days = Math.floor(hrs / 24);
      return plural(days, "{n} day", "{n} days");
    }

    // The tick's Today work. Everything on the tab is payload-driven except
    // "now" itself, so instead of rebuilding the tape every 30 s (which
    // tore down tap captions, the log's slide and native touch momentum
    // just to move the clock) only the now-driven bits move in place: the
    // svg's crop and fog advance to the new "now", a tape riding the clamp
    // re-glues to it, and updateStripMarker refreshes the readout, gauge
    // and log from the cached payload (the latter two skip unchanged html).
    // Two cases still need the full render and fall back to it: midnight
    // (the whole axis hangs off the tape's first midnight) and a viewport
    // width change (the scale derives from it — the tick's render was the
    // strip's only re-scale path, so it must stay one here).
    function stripTick() {
      var sc = stripScroller();
      var svg = sc && sc.querySelector(".rhythm-strip");
      if (!svg || !dashboardData) return;
      if (rsStartWallMs() !== stripRenderedStart ||
          (sc.clientWidth && sc.clientWidth !== stripRenderedW)) {
        renderDashboard();
        return;
      }
      var nowMin = rsNowMin();
      var vbw = rsX(nowMin);
      svg.style.width = (vbw / RS_VB * stripPx).toFixed(1) + "px";
      svg.setAttribute("viewBox", "0 14 " + vbw.toFixed(1) + " 124");
      var fg = svg.querySelector("#rs-fg");
      if (fg) {
        fg.setAttribute("x1", vbw.toFixed(1));
        fg.setAttribute("x2", rsX(nowMin + 30).toFixed(1));
      }
      var fog = svg.querySelector(".rs-fog-now");
      if (fog) {
        fog.setAttribute("x", vbw.toFixed(1));
        fog.setAttribute("width", (RS_VB - vbw).toFixed(1));
      }
      // Glued to "now": ride it (the guards mirror renderStrip's — a hand
      // on the tape wins over the clock).
      if (stripFollowNow && stripDragId === null && stripMomentum === null) {
        stripSetScroll(sc, rsScrollFor(sc, nowMin));
      }
      updateStripMarker();
    }

    setInterval(function() {
      // Keep the dashboard's now-driven readouts fresh from the cached
      // payload — no refetch, no tape rebuild (stripTick). On Settings the
      // same tick carries the masthead's age line across midnight (two
      // textContent writes, no DOM churn).
      if (currentTab === "today" && document.visibilityState === "visible") {
        stripTick();
      } else if (currentTab === "settings" && document.visibilityState === "visible") {
        renderMasthead(settingsBabies);
      }
    }, 30 * 1000);

    // A real width change re-renders the tape directly rather than waiting
    // out the tick: trailing-debounced (rotation fires resize in bursts)
    // and width-gated (mobile URL-bar collapse and the on-screen keyboard
    // resize only the height, and must not rebuild the tape mid-scroll).
    var stripResizeT = null;
    window.addEventListener("resize", function() {
      clearTimeout(stripResizeT);
      stripResizeT = setTimeout(function() {
        var sc = stripScroller();
        if (sc && sc.clientWidth && sc.clientWidth !== stripRenderedW) renderDashboard();
      }, 150);
    });

    // An installed PWA resumes from background rather than reloading, so the
    // data on screen can be hours old. Refetch whenever the app comes back.
    document.addEventListener("visibilitychange", function() {
      if (document.visibilityState !== "visible") return;
      if (currentTab === "today") loadDashboard();
      else loadSettingsTab();
    });

    // --- Edit mode: tap a ledger line to load it into the add row ---
    function formOf(entity) {
      return document.querySelector('form.entry-form[data-entity="' + entity + '"]');
    }

    function enterEdit(entity, item) {
      var form = formOf(entity);
      if (!form) return;
      editState[entity] = item.id;
      form.classList.add("editing");
      var inputs = form.querySelectorAll("input[name]");
      for (var i = 0; i < inputs.length; i++) {
        var inp = inputs[i];
        var key = inp.getAttribute("name");
        if (key === "when_date" || !(key in item)) continue;
        inp.value = item[key];
      }
      var when = form.querySelector('input[name="when_date"]');
      if (when) {
        when.max = madridDateStr(new Date());
        when.value = madridDateStr(new Date(item.ts));
      }
      form.querySelector("button[type=submit]").textContent = i18n("Update");
      var cancel = form.querySelector(".cancel-edit");
      if (cancel) cancel.hidden = false;
      form.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function exitEdit(entity) {
      var form = formOf(entity);
      if (!form) return;
      delete editState[entity];
      form.classList.remove("editing");
      form.querySelector("button[type=submit]").textContent = i18n("Add");
      var cancel = form.querySelector(".cancel-edit");
      if (cancel) cancel.hidden = true;
      form.reset();
    }

    // Ledger-line taps open the editor; the × keeps its own meaning.
    for (var entityName in entities) {
      (function(name) {
        var container = document.getElementById("list-" + name);
        if (!container) return;
        container.addEventListener("click", function(e) {
          if (!e.target || !e.target.closest) return;
          var btn = e.target.closest(".ledger-edit");
          if (!btn) return;
          var item = (listItemsById[name] || {})[btn.getAttribute("data-id")];
          if (item) enterEdit(name, item);
        });
      })(entityName);
    }

    // Content is the fold control: tapping the masthead, a measure's dial
    // or the partner roster folds that section's management panel — its
    // ledger, add/invite form and delete ×s — open or shut. The section
    // carries .editing while out; closing mid-edit lets go of the armed
    // record. (loadSettings also opens the babies fold for a household
    // with no baby yet.)
    function setFold(btn, open) {
      var ent = btn.getAttribute("data-entity");
      var panel = document.getElementById("panel-" + ent);
      panel.hidden = !open;
      btn.setAttribute("aria-expanded", open ? "true" : "false");
      var grp = btn.closest(".sect");
      if (grp) grp.classList.toggle("editing", open);
      if (!open && editState[ent]) exitEdit(ent);
      if (!open && ent === "babies" && babyEditId) exitBabyEdit();
    }

    var foldBtns = document.querySelectorAll(".fold-tap");
    for (var mb = 0; mb < foldBtns.length; mb++) {
      foldBtns[mb].addEventListener("click", function(e) {
        var btn = e.currentTarget;
        var panel = document.getElementById("panel-" + btn.getAttribute("data-entity"));
        setFold(btn, panel.hidden);
      });
    }

    // --- Entry forms ---
    // The date field rests on "today" (Madrid) and is fenced against the
    // future; a submit or cancel reset returns it there.
    function resetWhenDate(form) {
      var inp = form.querySelector('input[name="when_date"]');
      if (!inp) return;
      var ds = madridDateStr(new Date());
      inp.value = ds;
      inp.max = ds;
    }

    // A day is all these records need — the clock detail is manufactured.
    // Today → "now" (omitted on create: the server stamps it); the entry's
    // own day on an edit → omitted, keeping the recorded instant; any other
    // day → noon Madrid, a neutral mid-day moment.
    function whenFromDate(entity, ds, editId) {
      if (editId) {
        var orig = (listItemsById[entity] || {})[editId];
        if (orig && madridDateStr(new Date(orig.ts)) === ds) return null;
      }
      if (ds === madridDateStr(new Date())) {
        return editId ? new Date().toISOString() : null;
      }
      var d = parseWallTime(ds + "T12:00");
      return d ? d.toISOString() : null;
    }

    var entryForms = document.querySelectorAll("form.entry-form");
    for (var ef = 0; ef < entryForms.length; ef++) {
      resetWhenDate(entryForms[ef]);
      entryForms[ef].addEventListener("reset", function(e) {
        var form = e.currentTarget;
        setTimeout(function() { resetWhenDate(form); }, 0);
      });
      var cancelBtn = entryForms[ef].querySelector(".cancel-edit");
      if (cancelBtn) {
        cancelBtn.addEventListener("click", function(e) {
          var form = e.currentTarget.closest("form");
          exitEdit(form.getAttribute("data-entity"));
        });
      }
      entryForms[ef].addEventListener("submit", async function(e) {
        e.preventDefault();
        var form = e.currentTarget;
        var entity = form.getAttribute("data-entity");
        var editId = editState[entity];
        var fd = new FormData(form);
        var body = {};
        fd.forEach(function(v, k) {
          var s = String(v).trim();
          if (!s) return;
          if (k === "when_date") {
            var w = whenFromDate(entity, s, editId);
            if (w) body.when = w;
          } else if (NUMERIC_FIELDS[k]) {
            var n = parseFloat(s);
            if (!isNaN(n)) body[k] = n;
          } else {
            body[k] = s;
          }
        });
        var submitBtn = form.querySelector('button[type=submit]');
        submitBtn.disabled = true;
        try {
          if (editId) {
            await putJson(entities[entity].endpoint + "/" + editId, body);
            exitEdit(entity);
            toast(i18n("Updated"));
          } else {
            var created = await postJson(entities[entity].endpoint, body);
            form.reset();
            savedToast(entity, body, created);
          }
          loadList(entity);
        } catch (err) {
          toastErr(err);
        } finally {
          submitBtn.disabled = false;
        }
      });
    }

    // --- Inline delete confirmation (two-tap) ---
    // At rest the button is a bare ×; arming swells it into a Confirm? pill.
    function disarmAllDeletes(except) {
      var pending = document.querySelectorAll(".delete-btn.pending");
      for (var i = 0; i < pending.length; i++) {
        if (pending[i] === except) continue;
        pending[i].classList.remove("pending");
        pending[i].textContent = "×";
      }
    }

    document.addEventListener("click", async function(e) {
      var t = e.target;
      if (!t || !t.classList) return;
      if (!t.classList.contains("delete-btn")) {
        disarmAllDeletes(null);
        return;
      }
      if (t.classList.contains("baby-remove")) {
        // A baby's × doesn't two-tap — a whole diary is at stake, so it
        // goes straight to the confirm dialog, which does the stopping.
        disarmAllDeletes(null);
        babyRemoveOpen(t.getAttribute("data-id"));
        return;
      }
      if (!t.classList.contains("pending")) {
        disarmAllDeletes(t);
        t.classList.add("pending");
        t.textContent = i18n("Confirm?");
        setTimeout(function() {
          if (t.classList.contains("pending")) {
            t.classList.remove("pending");
            t.textContent = "×";
          }
        }, 4000);
        return;
      }
      var id = t.getAttribute("data-id");
      var entity = t.getAttribute("data-entity");
      t.disabled = true;
      try {
        if (t.classList.contains("cg-remove")) {
          // Partner removal shares the ledgers' × and its two-tap arm.
          await sendJson("DELETE", "/api/caregivers/" + encodeURIComponent(id));
          toast(i18n("Removed"));
          loadSettings();
        } else {
          await deleteEntry(entity, id);
          if (String(editState[entity]) === String(id)) exitEdit(entity);
          toast(i18n("Deleted"));
          loadList(entity);
        }
      } catch (err) {
        toastErr(err, "Delete error: {e}");
      } finally {
        t.disabled = false;
      }
    });

    // --- Baby removal (the careful one) ---
    // The dialog names the baby, states the blast radius in a full
    // sentence, and its danger button repeats the target — deliberately
    // heavier than the ledgers' two-tap ×.
    var babyDelId = null;
    var babyDlg = document.getElementById("baby-del-dialog");

    function babyRemoveOpen(id) {
      var b = null;
      for (var i = 0; i < settingsBabies.length; i++) {
        if (String(settingsBabies[i].id) === String(id)) b = settingsBabies[i];
      }
      if (!b) return;
      babyDelId = b.id;
      var name = b.name || "Baby #" + b.id;
      document.getElementById("baby-del-title").textContent = i18n("Delete {name}?", { name: name });
      document.getElementById("baby-del-body").textContent = i18n(
        "This permanently deletes {name}'s diary — every feeding, diaper, routine, weight and height. There is no undo.",
        { name: name }
      );
      document.getElementById("baby-del-confirm").textContent = i18n("Delete {name}", { name: name });
      babyDlg.showModal();
    }

    document.getElementById("baby-del-cancel").addEventListener("click", function() {
      babyDlg.close();
    });
    babyDlg.addEventListener("click", function(e) {
      closeOnBackdrop(babyDlg, e);
    });

    document.getElementById("baby-del-confirm").addEventListener("click", async function() {
      var btn = this;
      if (babyDelId == null) return;
      btn.disabled = true;
      try {
        await sendJson("DELETE", "/api/babies/" + encodeURIComponent(babyDelId));
        var wasSelected = String(babyDelId) === String(selectedBabyId);
        if (babyEditId && String(babyEditId) === String(babyDelId)) exitBabyEdit();
        babyDelId = null;
        babyDlg.close();
        toast(i18n("Deleted"));
        if (wasSelected) {
          // The selection just vanished: clear it and take the switcher's
          // move — a full reload re-fetches everything under the server's
          // fallback pick (or the first-run flow if no baby remains).
          try { localStorage.removeItem("babyId"); } catch (_) {}
          selectedBabyId = null;
          history.replaceState(null, "", location.pathname + location.hash);
          location.reload();
        } else {
          loadSettings();
          loadDashboard();
        }
      } catch (err) {
        toastErr(err, "Delete error: {e}");
      } finally {
        btn.disabled = false;
      }
    });

    // Profile (the selected baby's sex + birth date) drives the WHO bands.
    fetchJson("/api/profile").then(function(p) {
      profileData = p.baby || null;
      // Growth charts may have rendered before the profile arrived.
      if (currentTab === "settings") { loadList("weights"); loadList("heights"); }
    }).catch(function() {});

    applyStaticI18n();
    initSettingsLang();
    initSettingsNight();
    showTab("today");

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
