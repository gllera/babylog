<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baby diary</title>
  <link rel="icon" href="/icon.svg">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0070f3" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#101214" media="(prefers-color-scheme: dark)">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Baby diary">
  <link rel="apple-touch-icon" href="/icon-180.png">
  <style>
    :root {
      color-scheme: light dark;
      --primary: #0070f3;
      --primary-hover: #0058c4;
      --bg: #fafafa;
      --border: #e2e2e2;
      --text: #1a1a1a;
      --muted: #666;
      --danger: #d33;
      --danger-strong: #b22;
      --danger-soft: #fee;
      --hover: #f0f0f0;
      --toast-bg: #222;
      --toast-text: #fff;
      --toast-link: #8ab4f8;
      --poop: #b5651d;
      /* Routine marks sit next to poop's brown and the feed blue on the tape
         and in the quick-add row — keep the three domain hues far apart if
         retuning (the original amber was a near-twin of the brown). */
      --routine: #15803d;
      --warn: #d97700;
      --ok: #1a7f37;
      --night: rgba(0, 0, 0, 0.04);
      /* Shared rhythm: section gaps draw from this token. The toast is the
         one rounded thing left (it floats; everything on the page is
         squared, radius 0). */
      --radius-control: 6px;
      --stack: 16px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --primary: #3291ff;
        --primary-hover: #57a3ff;
        --bg: #101214;
        --border: #2e3338;
        --text: #e6e6e6;
        --muted: #9ba3ab;
        --danger: #ff6b6b;
        --danger-strong: #e05252;
        --danger-soft: #3a2226;
        --hover: #24282d;
        --toast-bg: #e8e8e8;
        --toast-text: #111;
        --toast-link: #0b57d0;
        --night: rgba(0, 0, 0, 0.25);
        --poop: #d08344;
        --routine: #4ade80;
        --warn: #ffa040;
        --ok: #4ace64;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    /* Always show the scrollbar track so tabs with and without overflow keep
       the same layout width. (scrollbar-gutter: stable reserved the space but
       left it blank on short tabs — an empty strip at the page edge.) */
    html { overflow-y: scroll; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    main {
      max-width: 920px;
      margin: 24px auto;
      padding: 0 16px 40px;
    }
    .tab { display: none; }
    .tab.active { display: block; }
    /* The Today log self-sizes to the viewport (stripListFit), so the
       tab-end breathing room main's padding buys the scrolled tabs would
       only push the page past the viewport here — drop it while Today is
       up; main's bottom margin is the gap that remains. */
    main:has(#tab-today.active) { padding-bottom: 0; }
    /* Growth records (Settings): each measure speaks the tape's language —
       squared hairline ghosts on the page background, no card. */
    /* Settings is the diary's FLYLEAF riding the app's centerline, like
       the Today tape's needle spine. The frame spans the same width as
       the tape (section dividers and fold-tap washes run the full main
       column) so the page doesn't narrow when switching tabs; only the
       management folds keep the charts' own narrow column (see
       .measure-panel below) — full-width ledger rows split date-left /
       value-right across a huge blank middle, rejected before. The baby
       leads as a masthead — this page says whose diary it is before it
       says anything else — then each section opens with a
       flanked-hairline micro-caps divider (the record-book rule).
       Content sits centered; management machinery stays behind the
       folds. */
    .masthead { padding: 4px 64px 0; text-align: center; }
    /* Content is the fold control (no ✎ ghosts anywhere): the masthead,
       each measure's dial and the partner roster are one borderless ghost
       each — tap the thing to manage it. Hover/press wash is the
       affordance, like the door. */
    .fold-tap {
      display: block;
      width: 100%;
      padding: 0;
      font: inherit;
      color: inherit;
      text-align: center;
      background: transparent;
      border: 0;
      border-radius: 0;
      cursor: pointer;
    }
    .masthead-btn { padding: 4px 0 6px; }
    .masthead-name { display: block; font-size: 30px; font-weight: 700; line-height: 1.25; }
    .masthead-sub { display: block; margin-top: 2px; font-size: 15px; color: var(--muted); }
    @media (hover: hover) {
      .fold-tap:hover { background: var(--hover); }
    }
    .fold-tap:active { background: var(--hover); }
    .fold-tap:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }
    .sect { margin-top: 40px; }
    /* The section divider: hairlines flanking the micro-caps title. */
    .sect-title {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      min-height: 40px;
      margin-bottom: 10px;
    }
    .sect-title::before, .sect-title::after {
      content: "";
      flex: 1 1 0;
      border-top: 1px solid var(--border);
    }
    .sect-title > span {
      flex: none;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    /* The dial: the number the screen is opened for, centered big over a
       small muted line ("today · percentile" under the estimate, "day ·
       percentile" on the no-estimate fallback). fitMeasureLatest drops
       the small segments end-first when the column runs short, and in
       the last extreme the value itself. */
    .measure-latest {
      display: block;
      min-width: 0;
      font-size: 15px;
      color: var(--muted);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .measure-latest .measure-val {
      display: block;
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .measure-note { font-style: italic; }
    .measure-chart { margin-top: 8px; margin-bottom: 4px; }
    .measure-chart[hidden] { display: none; }
    /* The household forms (add baby / invite) only differ from the measure
       add rows in their handlers, so they share every field rule; their
       unlabelled fields lean on placeholders + aria-labels the same way. */
    form.entry-form, form.settings-form { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
    .measure-field {
      flex: 1 1 140px;
      min-width: 0;
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
    }
    .measure-field input {
      flex: 1 1 auto;
      width: 100%;
      min-width: 0;
      min-height: 62px;
      padding: 0 4px 0 12px;
      border: 0;
      background: transparent;
      font-family: inherit;
      font-size: 18px;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .measure-field input:focus { outline: none; }
    .measure-field:focus-within { outline: 2px solid var(--primary); outline-offset: 2px; }
    .measure-unit { padding: 0 12px; color: var(--muted); font-size: 15px; }
    form.entry-form input[type=date],
    form.settings-form input, form.settings-form select,
    .night-options input {
      flex: 0 1 180px;
      min-width: 0;
      min-height: 64px;
      padding: 0 12px;
      font-family: inherit;
      font-size: 18px;
      color: var(--text);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 0;
      font-variant-numeric: tabular-nums;
    }
    /* Free-text fields own the leftover row width; the pickers keep to
       their natural sizes. */
    form.settings-form input[type=text], form.settings-form input[type=email] { flex: 1 1 200px; }
    form.settings-form select { flex: 0 1 160px; }
    /* One-line field group (add-baby identity): the name owns the slack,
       the pickers keep their formats' widths, nothing wraps — the buttons
       take the next line. */
    .form-line { flex: 1 1 100%; display: flex; gap: 8px; min-width: 0; }
    form.settings-form .form-line input[type=text] { flex: 1 1 60px; }
    form.settings-form .form-line select { flex: 0 1 auto; }
    form.settings-form .form-line input[type=date] { flex: 0 1 152px; }
    form.entry-form input[type=date]:focus-visible,
    form.settings-form input:focus-visible, form.settings-form select:focus-visible,
    .night-options input:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }
    form.entry-form button, form.settings-form button {
      flex: 0 1 auto;
      min-height: 64px;
      padding: 0 24px;
      font-family: inherit;
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 0;
      cursor: pointer;
    }
    @media (hover: hover) {
      form.entry-form button:hover, form.settings-form button:hover { background: var(--hover); }
    }
    form.entry-form button:disabled, form.settings-form button:disabled { opacity: 0.5; cursor: not-allowed; }
    form.entry-form .cancel-edit, form.settings-form .cancel-edit { color: var(--muted); }
    /* Edit mode: the tapped ledger line rides in the add row; its fields
       carry the accent until Update or Cancel lets go. */
    form.entry-form.editing .measure-field,
    form.entry-form.editing input[type=date],
    form.entry-form.editing button[type=submit],
    form.settings-form.editing input,
    form.settings-form.editing select,
    form.settings-form.editing button[type=submit] { border-color: var(--primary); }
    /* …and an open fold is modal in spirit: while any panel is out, every
       other block of the flyleaf (and the baby switcher) dims and goes
       inert until the fold contracts — the open section (its fold control
       included, that's the way back out) is the one live thing. The babies
       panel rides as the masthead's sibling, so it's named alongside its
       .sect. (No opacity transition here: Chrome never fires it when the
       change rides an ancestor :has() flip — the dim would stick at 1.) */
    #tab-settings:has(.sect.editing) > :not(.sect.editing, .measure-panel:not([hidden])),
    body:has(#tab-settings.active .sect.editing) #baby-switcher {
      opacity: 0.12;
      pointer-events: none;
    }
    /* The fixed ⚙/← door rides the viewport's top-left; the flyleaf column
       is centered and the masthead keeps symmetric side padding, so the
       content clears the door on every width without one-sided clearance
       hacks — the centering stays true. */
    /* The heading-row ghost: micro-caps hairline button. The measure/group
       Edit folds, the language toggles and the baby switcher all speak it;
       the toggles wear the accent on their hairline, never as a fill. */
    .lang-options button, #baby-switcher button {
      display: inline-flex;
      flex: none;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 14px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 0;
      cursor: pointer;
    }
    @media (hover: hover) {
      .lang-options button:hover, #baby-switcher button:hover { background: var(--hover); color: var(--text); }
    }
    .measure-panel[hidden] { display: none; }
    /* The ledger: one ruled line per record. In the growth groups AND the
       babies list the line itself is the edit button (.ledger-edit — tap a
       baby to fix its name or fill in the sex/birth date that gate the WHO
       features); the caregivers ledger uses the inert twin (.ledger-line).
       Both share the ghost × column (two-tap to confirm). */
    .ledger-row { display: flex; align-items: stretch; border-bottom: 1px solid var(--border); }
    .ledger-edit, .ledger-line {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 56px;
      padding: 0 12px;
      font-size: 16px;
      color: var(--text);
    }
    .ledger-edit {
      font-family: inherit;
      background: transparent;
      border: 0;
      cursor: pointer;
      text-align: left;
    }
    @media (hover: hover) {
      .ledger-edit:hover { background: var(--hover); }
    }
    .ledger-edit .grow, .ledger-line .grow {
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .ledger-when { color: var(--muted); font-variant-numeric: tabular-nums; }
    .ledger-val { margin-left: auto; font-weight: 600; font-variant-numeric: tabular-nums; }
    /* The gain since the previous reading — the number parents recite at
       checkups. A fixed column so every value keeps one right edge (the
       oldest row renders it empty). */
    .ledger-delta {
      flex: none;
      min-width: 6ch;
      text-align: right;
      font-size: 13px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    /* Micro-caps aside on a ledger line ("Girl", "you"). */
    .ledger-tag {
      flex: none;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    /* The ledger's delete: a ghost × in its own hairline column; the first
       tap arms it into a Confirm? pill, the second deletes. */
    .delete-btn {
      flex: none;
      min-width: 56px;
      min-height: 56px;
      padding: 0 8px;
      background: transparent;
      border: 0;
      border-left: 1px solid var(--border);
      border-radius: 0;
      color: var(--muted);
      font-size: 20px;
      font-family: inherit;
      cursor: pointer;
    }
    @media (hover: hover) {
      .delete-btn:hover { background: var(--danger-soft); color: var(--danger); }
    }
    .toast {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--toast-bg);
      color: var(--toast-text);
      padding: 10px 16px;
      border-radius: var(--radius-control);
      font-size: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,.2);
      opacity: 0;
      transition: opacity .2s;
      pointer-events: none;
      z-index: 10;
    }
    .toast.show { opacity: 1; }
    .toast.show.undoable { pointer-events: auto; }
    .toast.error { background: var(--danger); color: #fff; }
    .toast button {
      background: transparent;
      border: 0;
      color: var(--toast-link);
      font-weight: 700;
      font-size: 14px;
      font-family: inherit;
      margin-left: 12px;
      padding: 0;
      cursor: pointer;
    }
    /* Today = the 3-day rhythm strip, alone on the page background (no
       card), styled like a chart recorder: one faint lane per domain
       (feeds / diapers / routines, same hues as their tabs), night hours
       shaded, the future fogged out past "now". Tape-head interaction: the
       readout dial stands still near the viewport's RIGHT edge — the
       future is empty, so the past deserves the width — and the tape
       scrolls underneath its needle (drag/swipe the tape, or tap a spot to
       bring it under the needle; a tap that lands on a record's mark opens
       that record's editor instead). Flex spacers sized to the needle's
       offsets let 00:00 and "now" reach it; the scroll crop stops the
       needle at "now", so it can never point at the future. The quick-add
       buttons log at whatever time sits under it. */
    .rhythm-wrap { position: relative; }
    .rs-tape { position: relative; }
    .rhythm-scroll {
      display: flex;
      align-items: flex-start;
      overflow-x: auto;
      scrollbar-width: none;
      /* Window fades: the tape visibly runs on past both edges. */
      -webkit-mask-image: linear-gradient(to right,
        transparent, #000 32px, #000 calc(100% - 32px), transparent);
      mask-image: linear-gradient(to right,
        transparent, #000 32px, #000 calc(100% - 32px), transparent);
    }
    .rhythm-scroll::-webkit-scrollbar { display: none; }
    /* Spacers keep the scroll↔minute identity: the leading one equals the
       needle's offset from the viewport's left (100% − 48px), the trailing
       one its offset from the right (48px) — so the svg x under the needle
       is exactly scrollLeft, and scrollMax lands exactly on "now". */
    .rhythm-scroll::before { content: ""; flex: 0 0 calc(100% - 48px); }
    .rhythm-scroll::after { content: ""; flex: 0 0 48px; }
    .rhythm-strip {
      display: block;
      /* Width comes inline per render: scaled so the viewport spans 12 h of
         tape on wide screens, 4 h on narrow ones, and always cropped at
         "now" so the scroll range ends there. */
      flex: 0 0 auto;
      height: auto;
      overflow: visible; /* stamps + the un-scrollable rest of today paint past the crop */
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
    }
    /* Night = a whisper of darkness in both themes (--night), not a hover-
       gray block — which in dark mode even read *lighter* than the day.
       Edges fade over the band's ends (dusk/dawn aren't cliffs). */
    .rs-night { fill: url(#rs-ng); }
    .rs-night-stop { stop-color: var(--night); }
    .rs-lane { stroke: var(--border); stroke-width: 1; }
    /* Marks are doors to their record's editor (the tape click handler
       arms stripEdit from the nearest one within finger reach). */
    .rs-dot { stroke: var(--bg); stroke-width: 1; cursor: pointer; }
    /* Feed marks are bottle gauges centered on their lane (rounded, the
       user's sanctioned exception) whose fill level is the milk. Level =
       length, the encoding eyes read most accurately; the fixed footprint
       keeps the tape's rhythm steady while the level alone carries the
       amount. The vessel is NOT a ghost (user's ask): an opaque bg backing
       keeps the lane hairline and night wash from crossing the bottle. The
       milk wears the feed hue, same as every other feeding element (the
       user tried white and took it back). */
    .rs-gauge { cursor: pointer; }
    .rs-gauge-back { fill: var(--bg); }
    .rs-gauge-body { fill: none; stroke: var(--border); stroke-width: 1; }
    .rs-gauge-fill { fill: var(--primary); }
    .rs-dot.diaper { fill: var(--poop); }
    /* Pee is the diaper lane's droplet: a hairline outline in the diaper
       hue whose opaque bg fill doubles as the backing (bottle treatment —
       the lane and night wash never cross it). Icon and fill both carry
       the pee/poop split; at tape size a silhouette alone blurs. */
    .rs-drop { fill: var(--bg); stroke: var(--poop); stroke-width: 1; cursor: pointer; }
    .rs-dot.routine { fill: var(--routine); }
    /* Known routines wear a pictogram (user's pick): sun = Vitamin D,
       waves = Bath, lying bar = Tummy, cross = any medicine; unknown or
       custom names keep the solid dot. All in the routine green — the
       shape says which routine, the hue says the lane. A bg backing disc
       punches the lane out under each glyph (bottle treatment) so the
       hairline never threads through the strokes. */
    .rs-rtn { cursor: pointer; }
    .rs-rtn-back { fill: var(--bg); }
    .rs-rtn-fill { fill: var(--routine); }
    .rs-rtn-stroke { fill: none; stroke: var(--routine); stroke-width: 1.2; }
    /* Fog is decoration: it must not swallow the marks' hover titles. */
    .rs-fog { pointer-events: none; }
    /* The tape's limits are fog, not fences: past "now" — and mirrored at
       the tape's first midnight — it dissolves into the page background
       (gradient rects painted over everything). */
    .rs-fog-stop { stop-color: var(--bg); }
    /* Axis furniture: hourly ticks (taller every 3 h under the labels),
       hairline + date caption at each midnight. */
    .rs-tick { stroke: var(--border); stroke-width: 1; }
    .rs-tick.h3 { stroke: var(--muted); }
    .rs-mid { stroke: var(--border); stroke-width: 1; }
    .rs-hour {
      font-size: 9px;
      font-family: inherit;
      fill: var(--muted);
      text-anchor: middle;
      font-variant-numeric: tabular-nums;
    }
    .rs-day {
      font-size: 9px;
      font-family: inherit;
      font-weight: 700;
      fill: var(--muted);
      text-anchor: middle;
      font-variant-numeric: tabular-nums;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    /* The tape-head readout: a fixed dial whose text ends at the needle
       (right-aligned to its 48px inset), reading the moment the quick-add
       would log — big relative time over a small absolute one that
       resolves it ("Ayer · 22:05"). The dial is also a door: tapping it
       opens the jump-to-a-moment dialog (.rs-jump-dlg), so it renders as
       a full-width ghost button — borderless (it reads as a dial first),
       with only hover/press feedback and a focus ring giving it away.
       "Full-width" stops at the corner cluster's column: the ⚙ and the
       belly tank sit over this band (page top-left), so the wrapper
       insets the ghost past both boxes (64px door + 48px tank band +
       10px gap) or the wash and hit area would run underneath them — a
       near-miss on the tank must not open the jump dialog. */
    .rs-readout {
      text-align: right;
      padding-left: 122px;
    }
    .rs-readout-btn {
      display: block;
      width: 100%;
      padding: 4px 48px 6px 0;
      text-align: right;
      font-family: inherit;
      background: transparent;
      border: 0;
      border-radius: 0;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }
    @media (hover: hover) {
      .rs-readout-btn:hover { background: var(--hover); }
    }
    .rs-readout-btn:active { background: var(--hover); }
    .rs-readout-btn:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: -2px;
    }
    /* Jump dialog: tapping the readout opens a modal with a Madrid
       date+time form. The app's one floating surface, so it keeps the
       language anyway — squared, hairline-bordered, on the plain page
       background. Each field is a labelled instrument window (the whole
       box focuses its input). On phones the box becomes a full-bleed
       bottom sheet: the thumb's corner of the screen, not the
       browser-alert middle. */
    .rs-jump-dlg {
      width: min(420px, calc(100vw - 32px));
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 0;
      background: var(--bg);
      color: var(--text);
    }
    .rs-jump-dlg::backdrop { background: rgba(0, 0, 0, 0.45); }
    /* Baby-removal confirm: the one place the app stops you — a whole
       diary is at stake. Same floating surface as the jump dialog;
       Cancel stays a quiet ghost, the danger button names its target
       ("Delete Sofía"). */
    .baby-del-body { margin: 0 0 16px; font-size: 16px; line-height: 1.5; }
    .baby-del-actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
    .baby-del-actions button {
      min-height: 48px;
      padding: 0 16px;
      font-family: inherit;
      font-size: 16px;
      color: var(--text);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 0;
      cursor: pointer;
    }
    #baby-del-confirm {
      color: #fff;
      background: var(--danger);
      border-color: var(--danger);
      font-weight: 600;
    }
    @media (hover: hover) {
      .baby-del-actions button:hover { background: var(--hover); }
      #baby-del-confirm:hover { background: var(--danger-strong); border-color: var(--danger-strong); }
    }
    .baby-del-actions button:focus-visible {

      height: 26px;
      flex: 1;
      min-width: 0;

    .fg-rail {

      left: 0;
      right: 0;
      top: 50%;
      height: 0;

      height: 16px;

      top: 0;
      bottom: 0;
      width: 2px;
      transform: translateX(-50%);
      background: var(--primary);

      top: -1px;
      left: 50%;
      transform: translateX(-50%);

      height: 0;

      border-right: 5px solid transparent;
      border-top: 7px solid var(--primary);

      height: 8px;

      top: 50%;
      width: 2px;

    .delete-btn.pending {

    /* Baby switcher (multi-baby households only; stays hidden otherwise).
       Right padding keeps the chip row clear of the corner button. */
    #baby-switcher { display: flex; gap: 8px; padding: 12px 16px 0 136px; flex-wrap: wrap; max-width: 920px; margin: 0 auto; }
    #baby-switcher[hidden] { display: none; }
    /* The app's one door: a bare glyph riding the top-left of the content
       column. On Today it shows the sliders glyph — three rails with a dot
       riding each, a miniature of the tape's own lanes — and opens Settings;
       on Settings it reads ← and returns (showTab toggles .at-settings, which
       swaps the two glyphs already in the markup). Speaks the strip-step
       dialect — 64px icon square, 24px glyph — so the primary control isn't
       the smallest thing on the page. Its left edge is clamped to the tape's
       left edge (main: 920px border-box centered + 16px padding → 50% −
       444px), so on wide viewports it stays above the timeline instead of
       drifting to the viewport corner. Anchored to the top of the PAGE, not
       the viewport (user's ask 2026-07-12): it scrolls away with the
       content instead of floating over it. */
    #settings-btn {
      position: absolute;
      top: 10px;
      left: max(10px, calc(50% - 444px));
      z-index: 40;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      border: 1px solid transparent;
      background: var(--bg);
      color: var(--muted);
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      font-family: inherit;
      transition: background-color 80ms ease;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }
    #settings-btn svg { display: block; }
    #settings-btn .door-back { display: none; }
    #settings-btn.at-settings .door-glyph { display: none; }
    #settings-btn.at-settings .door-back { display: block; }
    @media (hover: hover) {
      #settings-btn:hover { background: var(--hover); color: var(--text); }
    }
    #settings-btn:active { background: var(--hover); color: var(--text); }
    #settings-btn:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }
    /* The belly ring (realistic belly-ring design): the hunger meter's face,
       riding the corner cluster right of the door — a radial fullness gauge
       filling the reserved 48px band. The feed-hue arc is fullness at the
       marker on her own 0→peak scale; a muted tick marks the usually-fed
       reserve; the centre carries a terse countdown (or the belly ml), the
       precise clock-time living in the tap. A second sanctioned curved
       exception after the tape bottle — hairline track, domain-hue fill,
       muted reserve tick, danger-for-hungry, all via existing vars so
       dark/light follow free. Hidden on Settings via the sibling selector —
       the door reads ← there and the flyleaf carries no live status. The 48px
       ring is its own touch band (the door's dialect: hit area ≥ the glyph);
       its left edge continues the door's clamp math (door left + 64px), so the
       readout's 122px inset (64px door + 48px ring + 10px gap) is unchanged. */
    #belly-tank {
      position: absolute;
      top: 10px;
      left: max(74px, calc(50% - 380px));
      z-index: 40;
      display: flex;
      align-items: center;
      height: 64px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }
    #belly-tank[hidden] { display: none; }
    .br-wrap { position: relative; display: inline-flex; }
    .br-svg { display: block; }
    .br-track { fill: none; stroke: var(--border); stroke-width: 2; }
    /* Patched in place (node identity survives updates), so the arc can
       ease between states instead of jumping on scrubs and ticks. */
    .br-fill { fill: none; stroke: var(--primary); stroke-width: 4; transition: stroke-dasharray 240ms ease; }
    @media (prefers-reduced-motion: reduce) { .br-fill, .br-tick { transition: none; } }
    /* The reserve tick rides a transform (rotate to the reference angle), so
       the usually-fed marker glides to a new level — day/night switch, a fresh
       calibration — instead of snapping. Transitioning transform is portable;
       transitioning x1/y1/x2/y2 geometry is not. */
    .br-tick { stroke: var(--muted); stroke-width: 2; transition: transform 240ms ease; }
    /* The countdown token, centred over the ring — the glanceable answer to
       "when is the next feed?". Crisp HTML text (easier i18n than SVG text),
       non-interactive so the tap falls through to #belly-tank. */
    .br-token {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      pointer-events: none;
    }
    .br-ml { font-style: normal; font-size: 8px; font-weight: 500; color: var(--muted); margin-left: 1px; }
    /* The countdown's time unit (m / h / ½h) mirrors the ml unit's small
       upright shape, but wears the feed hue --primary where ml stays muted —
       so a glance tells a next-feed countdown from the belly ml by colour, not
       by reading "m" vs "ml". The countdown only shows on the non-hungry
       (feed-hue) arc, so it never fights the danger token. */
    .br-unit { font-style: normal; font-size: 8px; font-weight: 500; color: var(--primary); margin-left: 1px; }
    /* Probably hungry (emptier than her usual pre-feed level): the arc and the
       centre token trade the feed hue for danger — the reserve tick makes the
       red self-explanatory (below the level she usually eats at). The track
       stays hairline. */
    #belly-tank.hungry .br-fill { stroke: var(--danger); }
    #belly-tank.hungry .br-token { color: var(--danger); }
    #settings-btn.at-settings + #belly-tank { display: none; }
    /* The flyleaf reads whose diary → the child's data → the household's
       people → app pref. Each section's management controls (ledger,
       add/invite form, partner removal) fold behind its content tap;
       .editing marks a section whose panel is out and unhides its
       delete ×s. */
    .sect:not(.editing) .delete-btn { display: none; }
    /* While a fold is out its divider signs the state: the micro-caps
       title takes the ink hue — the whisper that replaced the old ✎'s
       Edit→Close flip ("this panel is mine; tap the content to close").
       The at-rest roster mutes while its ruled ledger below is the live
       copy. (The masthead section has no divider; its panel opening
       directly beneath is its own signal.) */
    .sect.editing .sect-title > span { color: var(--primary); }
    .sect.editing .roster { color: var(--muted); }
    /* The folds keep the flyleaf's original narrow column (the charts'
       width) inside the full-width frame: ledgers and forms stay compact
       while the dividers above them run tape-wide. */
    #tab-settings .measure-panel { margin: 12px auto 0; max-width: 592px; }
    #tab-settings > .sect:first-child { margin-top: 0; }
    /* The partner roster at rest: ruleless centered lines on the spine,
       like Today's log rows — the ruled ledger dialect (with the remove
       ×s, which can't nest inside the roster's button) stays inside the
       fold. */
    .roster { display: flex; flex-direction: column; }
    .roster-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      min-height: 44px;
    }
    .roster-main {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 16px;
    }
    /* Screen-reader-only text: each fold control appends "Edit" here, so
       tapping targets read as "…, Edit" rather than bare content. */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip-path: inset(50%);
      white-space: nowrap;
    }
    .lang-options { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .lang-options button.active, #baby-switcher button.active { border-color: var(--primary); color: var(--text); }
    /* Night window: two time pickers around a quiet dash, centered on the
       flyleaf's spine like the language row. */
    .night-options { display: flex; gap: 8px; align-items: center; justify-content: center; }
    .night-options input { flex: 0 1 152px; }
    .night-options .night-dash { color: var(--muted); }
    .settings-list { display: flex; flex-direction: column; }
    .settings-note { color: var(--muted); font-size: 14px; margin: 10px 0 0; }
    @media (max-width: 640px) {
      :root { --stack: 14px; }
      #baby-switcher { padding: 10px 10px 0 136px; }
      main { margin: 14px auto; padding: 0 10px 24px; }

      .strip-btn { font-size: 16px; padding: 12px 8px; }
      .rs-readout-rel { font-size: 22px; }
      .rs-readout-abs { font-size: 13px; }
      .rs-jump input { font-size: 16px; } /* 16px floor: below it iOS zooms the page on focus */

      /* Same 16px iOS-zoom floor as .rs-jump; buttons drop to their own
         full-width line so the value+date row stays whole. */
      .masthead { padding: 0 56px; }
      .masthead-name { font-size: 24px; }
      .sect { margin-top: 32px; }
      .measure-latest .measure-val { font-size: 22px; }
      .measure-field input, form.entry-form input[type=date],
      form.settings-form input, form.settings-form select,
      .night-options input { font-size: 16px; min-height: 54px; }
      form.entry-form input[type=date] { flex: 1 1 130px; }
      form.entry-form button, form.settings-form button { flex: 1 1 100%; min-height: 56px; font-size: 16px; }
    }
  </style>
</head>
<body>
  <!-- The one control outside the tabs: showTab() keeps its glyph and label
       in step (⚙ opens Settings, ← returns to Today). -->
  <button type="button" id="settings-btn" aria-label="Settings" title="Settings">
    <svg class="door-glyph" width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
      <g stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </g>
      <g fill="currentColor">
        <circle cx="14" cy="6" r="3"/>
        <circle cx="8" cy="12" r="3"/>
        <circle cx="16" cy="18" r="3"/>
      </g>
    </svg>
    <span class="door-back" aria-hidden="true">&#8592;</span>
  </button>
  <!-- The belly tank (belly-tank spec): the corner cluster's second half —
       the tape's bottle vessel at cluster size, milk level = what's still
       in her belly at the marker. Filled by updateBellyTank(); stays
       hidden while the meter is gated (young history, marker before
       tracking). MUST stay the button's next sibling: the at-settings
       sibling selector hides it on the flyleaf. -->
  <div id="belly-tank" hidden></div>
  <div id="baby-switcher" hidden></div>

  <main>
    <section id="tab-today" class="tab active">
      <div id="today-strip">
        <div class="empty-note" data-i18n="Loading…">Loading&hellip;</div>
      </div>
    </section>

    <section id="tab-settings" class="tab">
      <!-- The flyleaf: whose diary this is, then the child's data, the
           household's people, and the app pref — centered on the spine,
           frame as wide as the Today tape, folds in a narrow column.
           The masthead names the selected baby and is itself the fold
           control — tapping the name/age opens the babies ledger + add
           form (identity is content, management is a fold). -->
      <div class="sect masthead">
        <button type="button" class="fold-tap masthead-btn" data-entity="babies" aria-expanded="false" aria-controls="panel-babies">
          <span class="masthead-name" id="masthead-name" data-i18n="Baby diary">Baby diary</span>
          <span class="masthead-sub" id="masthead-sub"></span>
          <span class="sr-only" data-i18n="Edit">Edit</span>
        </button>
      </div>
      <div class="measure-panel" id="panel-babies" hidden>
        <div class="settings-list" id="settings-babies">
          <div class="empty-note" data-i18n="Loading…">Loading&hellip;</div>
        </div>
        <form class="settings-form" id="form-add-baby">
          <div class="form-line">
            <input type="text" name="name" maxlength="100" required placeholder="Sof&iacute;a" aria-label="Name" data-i18n-aria-label="Name">
            <select name="sex" aria-label="Sex" data-i18n-aria-label="Sex">
              <option value="" data-i18n="Sex">Sex</option>
              <option value="female" data-i18n="Girl">Girl</option>
              <option value="male" data-i18n="Boy">Boy</option>
            </select>
            <input type="date" name="date_of_birth" aria-label="Birth date" data-i18n-aria-label="Birth date">
          </div>
          <button type="submit" data-i18n="Add baby">Add baby</button>
          <button type="button" class="cancel-edit" hidden data-i18n="Cancel">Cancel</button>
        </form>
      </div>

      <!-- Growth: each measure is a dial — the estimate for right now,
           centered big over the WHO trend. The dial itself is the fold
           control (add row + ledger behind it). -->
      <div class="sect">
        <div class="sect-title"><span data-i18n="Weight">Weight</span></div>
        <button type="button" class="fold-tap" data-entity="weights" aria-expanded="false" aria-controls="panel-weights">
          <span class="measure-latest" id="latest-weights"><span class="measure-note" data-i18n="Loading…">Loading&hellip;</span></span>
          <span class="sr-only" data-i18n="Edit">Edit</span>
        </button>
        <div class="measure-chart" id="weights-chart" hidden></div>
        <div class="measure-panel" id="panel-weights" hidden>
          <form class="entry-form" data-entity="weights">
            <label class="measure-field">
              <input type="number" name="weight_g" step="1" min="1" inputmode="numeric" required placeholder="4250" aria-label="Weight (g)" data-i18n-aria-label="Weight (g)">
              <span class="measure-unit">g</span>
            </label>
            <input type="date" name="when_date" required aria-label="Date" data-i18n-aria-label="Date">
            <button type="submit" data-i18n="Add">Add</button>
            <button type="button" class="cancel-edit" hidden data-i18n="Cancel">Cancel</button>
          </form>
          <div class="list" id="list-weights"></div>
        </div>
      </div>

      <div class="sect">
        <div class="sect-title"><span data-i18n="Height">Height</span></div>
        <button type="button" class="fold-tap" data-entity="heights" aria-expanded="false" aria-controls="panel-heights">
          <span class="measure-latest" id="latest-heights"><span class="measure-note" data-i18n="Loading…">Loading&hellip;</span></span>
          <span class="sr-only" data-i18n="Edit">Edit</span>
        </button>
        <div class="measure-chart" id="heights-chart" hidden></div>
        <div class="measure-panel" id="panel-heights" hidden>
          <form class="entry-form" data-entity="heights">
            <label class="measure-field">
              <input type="number" name="height_cm" step="1" min="1" inputmode="numeric" required placeholder="54" aria-label="Height (cm)" data-i18n-aria-label="Height (cm)">
              <span class="measure-unit">cm</span>
            </label>
            <input type="date" name="when_date" required aria-label="Date" data-i18n-aria-label="Date">
            <button type="submit" data-i18n="Add">Add</button>
            <button type="button" class="cancel-edit" hidden data-i18n="Cancel">Cancel</button>
          </form>
          <div class="list" id="list-heights"></div>
        </div>
      </div>

      <!-- The people who share the diary: a ruleless centered roster at
           rest, itself the fold control; inviting and removing (a ruled
           ledger — the ×s can't nest inside the roster button) fold
           behind it. -->
      <div class="sect">
        <div class="sect-title"><span data-i18n="Partners">Partners</span></div>
        <button type="button" class="fold-tap" data-entity="caregivers" aria-expanded="false" aria-controls="panel-caregivers">
          <span class="roster" id="settings-caregivers"><span class="empty-note" data-i18n="Loading…">Loading&hellip;</span></span>
          <span class="sr-only" data-i18n="Edit">Edit</span>
        </button>
        <div class="measure-panel" id="panel-caregivers" hidden>
          <div class="settings-list" id="ledger-caregivers"></div>
          <form class="settings-form" id="form-invite">
            <input type="email" name="email" required placeholder="partner@example.com" aria-label="Email" data-i18n-aria-label="Email">
            <button type="submit" data-i18n="Invite">Invite</button>
          </form>
          <p class="settings-note" data-i18n="Invited partners must also be allowed by the Cloudflare Access policy, or they cannot log in.">Invited partners must also be allowed by the Cloudflare Access policy, or they cannot log in.</p>
        </div>
      </div>

      <!-- The child's night (wall-clock window): shades the Today tape and
           gives the hunger reference its own night bar. Direct controls
           like Language — nothing to fold; saved on this device. -->
      <div class="sect">
        <div class="sect-title"><span data-i18n="Night">Night</span></div>
        <div class="night-options" id="settings-night">
          <input type="time" id="night-start" required aria-label="Night starts" data-i18n-aria-label="Night starts">
          <span class="night-dash">&ndash;</span>
          <input type="time" id="night-end" required aria-label="Night ends" data-i18n-aria-label="Night ends">
        </div>
        <p class="settings-note" data-i18n="Night hours shade the Today tape and get their own hunger level. Saved on this device.">Night hours shade the Today tape and get their own hunger level. Saved on this device.</p>
      </div>

      <!-- Language is its own control — nothing to fold; it closes the
           flyleaf as the least-touched section. -->
      <div class="sect">
        <div class="sect-title"><span data-i18n="Language">Language</span></div>
        <div class="lang-options" id="settings-lang">
          <button type="button" data-lang="en">English</button>
          <button type="button" data-lang="es">Espa&ntilde;ol</button>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- Jump-to-a-moment dialog, opened by tapping the tape-head readout.
       Its form is rebuilt on every open (stripJumpOpen), so the fields are
       always prefilled with the marker's current moment. -->
  <dialog id="jump-dialog" class="rs-jump-dlg"></dialog>

  <!-- Baby-removal confirm. Deleting a baby erases a whole diary, so the
       ledger × skips the two-tap arm and opens this instead: it names the
       baby, spells out exactly what goes, and the danger button repeats
       the target. Title/body/confirm are filled per baby on open. -->
  <dialog id="baby-del-dialog" class="rs-jump-dlg">
    <div class="rs-jump-title" id="baby-del-title"></div>
    <p class="baby-del-body" id="baby-del-body"></p>
    <div class="baby-del-actions">
      <button type="button" id="baby-del-cancel" data-i18n="Cancel">Cancel</button>
      <button type="button" id="baby-del-confirm"></button>
    </div>
  </dialog>

  <script>
    var NUMERIC_FIELDS = { amount_ml: true, weight_g: true, height_cm: true };
    var DAY_MS = 86400000;

    // ---- i18n (English default + Spanish) -----------------------------------
    // Client-side only: the chosen language is remembered in localStorage
    // ("lang"), else guessed from the browser. Strings are keyed by their
    // English text, so English needs no table (a missing key falls back to the
    // key itself) — only Spanish overrides live in STRINGS.es. Switching
    // reloads the page (like the baby switcher), so every static and dynamic
    // string re-renders under the new language. Mirrors src/alexa-i18n.ts.
    var LANG = "en";
    try {
      var storedLang = localStorage.getItem("lang");
      if (storedLang === "en" || storedLang === "es") {
        LANG = storedLang;
      } else {
        var navLang = (navigator.language || navigator.userLanguage || "en").toLowerCase();
        if (navLang.indexOf("es") === 0) LANG = "es";
      }
    } catch (_) {}

    // Night window (Madrid wall clock): shades the tape and splits the
    // hunger calibration into day/night classes. Redefinable in Settings,
    // remembered per device like the language ("night" = "HH:MM-HH:MM");
    // defaults to 21:00–07:00. Equal times = no night (degenerate but
    // honest: no shading, one combined hunger reference).
    var nightStartMin = 21 * 60, nightEndMin = 7 * 60;
    try {
      var storedNight = /^(\d{2}):(\d{2})-(\d{2}):(\d{2})$/.exec(localStorage.getItem("night") || "");
      if (storedNight) {
        nightStartMin = +storedNight[1] * 60 + +storedNight[2];
        nightEndMin = +storedNight[3] * 60 + +storedNight[4];
      }
    } catch (_) {}
    // Night length in minutes; the window may cross midnight (the default
    // does), so all night tests run modulo the day.
    function nightDurMin() { return (nightEndMin - nightStartMin + 1440) % 1440; }

    var STRINGS = {
      es: {
        // App / nav
        "Baby diary": "Diario del bebé",
        "Today": "Hoy",
        "Feeding": "Toma",
        "Diaper": "Pañal",
        "Routine": "Rutina",
        "Weight": "Peso",
        "Height": "Talla",
        "Back to Today": "Volver a Hoy",
        // Dashboard (Today tab)
        "Loading…": "Cargando…",
        // Composer annotation block (quick-add picker / record editor)
        "Slide the tape to change the time.": "Desliza la cinta para cambiar la hora.",
        "Saving moves this entry to the new time.": "Al guardar, se moverá a la nueva hora.",
        // Readout jump panel
        "Jump to a date and time": "Saltar a una fecha y hora",
        "Date": "Fecha",
        "Time": "Hora",
        "Go": "Ir",
        // Feeding readout under the Today tape
        "No feeds in this window yet.": "Aún no hay tomas en esta ventana.",
        "usual": "habitual",
        "typical day": "día típico",
        "lowest day": "día más bajo",
        "highest day": "día más alto",
        "day total {n} ml": "total del día {n} ml",
        "24h before this moment": "24 h antes de este momento",
        "{n} day before this moment": "{n} día antes de este momento",
        "{n} days before this moment": "{n} días antes de este momento",
        // Indication labels — bare names stored in English in the DB
        // (growth.ts catalog + seeded rows); known ones translate here,
        // custom labels pass through. 'Bath' and 'Tummy' ride the
        // routine-name entries below.
        "Milk": "Leche",
        "Feeds": "Tomas",
        "Feed gap": "Entre tomas",
        "Poops": "Cacas",
        "Pees": "Pises",
        "Vitamin": "Vitamina",
        // Target tooltips — the tapped chip's rule, spelled out
        "At least {n} a day": "Al menos {n} al día",
        "At most {n} a day": "Como máximo {n} al día",
        "At least {n} every {d} days": "Al menos {n} cada {d} días",
        "At most {n} every {d} days": "Como máximo {n} cada {d} días",
        "At most {n} between feeds": "Máximo {n} entre tomas",
        "150 ml per kg of body weight": "150 ml por kg de peso",
        "adjusts with age": "se ajusta con la edad",
        // Belly ring tap captions
        "belly ≈ {n} ml": "barriga ≈ {n} ml",
        "next feed ~{t}": "próxima toma ~{t}",
        "next feed ~ now": "próxima toma ~ ya",
        "usually fed by ~{t}": "suele comer antes de las ~{t}",
        "usually fed when ≈ {n} ml remain": "suele comer cuando quedan ≈ {n} ml",
        // Belly ring centre countdown token short end (the m / h / ½h units
        // are not translated — hardcoded in bellyCountdownToken like durationLabel)
        "soon": "pronto",
        "now": "ya",
        // Forms
        "Add": "Añadir",
        "Update": "Actualizar",
        "Cancel": "Cancelar",
        "Edit": "Editar",
        "Weight (g)": "Peso (g)",
        "Height (cm)": "Talla (cm)",
        "Now": "Ahora",
        // Diaper kinds
        "Pee": "Pis",
        "Poop": "Caca",
        // Routine canonical names → Spanish display
        "Vitamin D": "vitamina D",
        "Bath": "baño",
        "Tummy": "boca abajo",
        "Walk": "paseo",
        "Paracetamol": "paracetamol",
        "Ibuprofen": "ibuprofeno",
        "Cream": "pomada",
        "Syrup": "jarabe",
        "Massage": "masaje",
