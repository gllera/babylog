name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:

# One deploy at a time; don't cancel a deploy mid-flight.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  deploy-worker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: dbdb8961e24f100cde9bc1aa2127f014
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Schema before code: migrations are additive, so the old Worker tolerates
      # the new schema but the new Worker may require it (the growth-targets
      # deploy shipped without 0002 and broke /api/dashboard in prod).
      - run: npm run db:migrate:remote
      - run: npm run deploy

  # Deploys after the Worker so new intents never go live before their handlers.
  # Always pushes the model (idempotent — an unchanged model just rebuilds).
  alexa-model:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: deploy-worker
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ASK_REFRESH_TOKEN: ${{ secrets.ASK_REFRESH_TOKEN }}
      ASK_VENDOR_ID: ${{ secrets.ASK_VENDOR_ID }}
      # ask-cli's env-var profile refuses to activate without AWS creds, even
      # though SMAPI-only commands never touch AWS. Dummy values satisfy it.
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      SKILL_ID: amzn1.ask.skill.effc5ede-64f1-4aa8-9bab-d9755f70fb2c
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      # es-ES has its own model; en-US and en-GB share alexa-skill/interaction-model.en.json.
      - name: Push interaction models
        run: |
          set -e
          npx ask-cli@2 smapi set-interaction-model -s "$SKILL_ID" -g development -l es-ES \
            --interaction-model "file:alexa-skill/interaction-model.es-ES.json"
          npx ask-cli@2 smapi set-interaction-model -s "$SKILL_ID" -g development -l en-US \
            --interaction-model "file:alexa-skill/interaction-model.en.json"
          npx ask-cli@2 smapi set-interaction-model -s "$SKILL_ID" -g development -l en-GB \
            --interaction-model "file:alexa-skill/interaction-model.en.json"
      # SMAPI's status payload doesn't reliably list every locale — a locale can
      # drop out of the response once its build settles, which KeyError'd the old
      # per-locale poll. Aggregate whatever locales it does report instead.
      - name: Wait for model builds
        run: |
          for i in $(seq 1 30); do
            agg=$(npx ask-cli@2 smapi get-skill-status -s "$SKILL_ID" --resource interactionModel 2>/dev/null | python3 -c '
          import json, sys
          try:
              models = json.load(sys.stdin).get("interactionModel", {})
          except Exception:
              models = {}
          st = [v.get("lastUpdateRequest", {}).get("status", "") for v in models.values()]
          print("FAILED" if "FAILED" in st else "SUCCEEDED" if st and all(s == "SUCCEEDED" for s in st) else "IN_PROGRESS")
          ')
            echo "attempt $i: $agg"
            [ "$agg" = "SUCCEEDED" ] && exit 0
            [ "$agg" = "FAILED" ] && { echo "interaction model build FAILED" >&2; exit 1; }
            sleep 10
          done
          echo "timed out waiting for interaction model builds" >&2
          exit 1
